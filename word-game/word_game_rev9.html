// ---------- CANVAS SETUP ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---------- AUDIO ----------
let actx = null;
let muted = false;
function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; }
  }
  if(actx && actx.state==='suspended'){ actx.resume(); }
}
function beep(freq, dur, type, vol, delay){
  if(muted || !actx) return;
  type = type||'square'; vol = vol===undefined?0.15:vol; delay = delay||0;
  const t = actx.currentTime + delay;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sfxPlace(){ beep(520,0.05,'square',0.10,0); }
function sfxInvalid(){ beep(160,0.08,'sawtooth',0.10,0); }
function sfxWordFound(len){
  const tones = [523,659,784,1046,1318];
  const n = Math.min(len-2, tones.length);
  for(let i=0;i<n;i++) beep(tones[i],0.10,'triangle',0.15,i*0.06);
}
function sfxGrow(){ beep(880,0.06,'sine',0.12,0); beep(1100,0.08,'sine',0.10,0.05); }
function sfxMiss(){ beep(150,0.25,'sawtooth',0.18,0); }
function sfxGameOver(){ [420,340,260,160].forEach((f,i)=>beep(f,0.22,'sawtooth',0.18,i*0.16)); }
function sfxSelect(){ beep(660,0.05,'sine',0.10,0); }
function sfxDeselect(){ beep(330,0.05,'sine',0.08,0); }
function sfxUrgent(){ beep(900,0.06,'square',0.08,0); }
function sfxTrash(){ beep(220,0.10,'sawtooth',0.12,0); beep(120,0.12,'sawtooth',0.10,0.05); }
function sfxStart(){ beep(700,0.09,'square',0.14,0); beep(950,0.09,'square',0.14,0.09); }

// ---------- GRID / LAYOUT CONSTANTS ----------
const GRID_SIZE = 10;
const CELL = 40;
const GAP = 3;
const PITCH = CELL + GAP;
const GRID_W = GRID_SIZE*CELL + (GRID_SIZE-1)*GAP;
const GRID_LEFT = (W-GRID_W)/2;
const GRID_TOP = 150;
const GRID_RIGHT = GRID_LEFT + GRID_W;
const GRID_BOTTOM = GRID_TOP + GRID_W;
const HUD_DIVIDER_Y = 64;
const TRAY_Y = 104;
const TRAY_SLOT = 42;
const TRAY_GAP = 8;
const WORDLIST_TOP = GRID_BOTTOM + 8;
const WORDLIST_BOTTOM = H - 6;

// trash can — sits in the empty margin to the right of the grid; drag any
// tray or grid letter here to discard it
const TRASH_W = 72, TRASH_H = 82;
const TRASH_X = GRID_RIGHT + (W-GRID_RIGHT)/2;
const TRASH_Y = (GRID_TOP+GRID_BOTTOM)/2;

const TILE_COLORS = { fill:'rgba(0,255,242,0.08)', border:'#00fff2', text:'#eafffe' };
const CLEAR_COLOR = '#ffe600';
const TRAY_CAP = 10;

// ---------- LETTER FREQUENCY BAG ----------
// rev3: letter weights derived from actual per-letter frequency across the
// game's own dictionary (not generic English/Scrabble frequency), so the
// tray favors letters this specific word list can actually use — makes the
// game easier since rare-in-dictionary letters show up less often
const LETTER_FREQ = {A:8,B:2,C:4,D:4,E:12,F:2,G:3,H:2,I:7,J:1,K:1,L:5,M:3,N:6,O:6,P:3,Q:1,R:8,S:8,T:7,U:3,V:1,W:1,X:1,Y:2,Z:1};
const LETTER_BAG = Object.entries(LETTER_FREQ).flatMap(([ch,n])=>Array(n).fill(ch));
function randomLetter(){ return LETTER_BAG[Math.floor(Math.random()*LETTER_BAG.length)]; }

const SCORE_FOR_LENGTH = {4:60,5:100,6:150,7:220,8:320};

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

// ---------- STATE ----------
let state = 'title'; // title | playing | paused | gameover
let grid, placedAt;
let tray = []; // [{ch, startTime, duration}]
let traySize = 5;
// A "letter source" is either {type:'tray', index} or {type:'grid', row, col} —
// rev4 lets you pick up a letter from the tray OR from an already-placed
// grid cell and move it, via the same click-click / drag mechanism.
let selectedSource = null;
let pointerDown = null; // {source, downX, downY, moved}
let dragGhost = null; // {source, x, y}
let score = 0;
let highScore = parseInt(localStorage.getItem('wordGameHighScore')||'0',10) || 0;
let elapsed = 0;
let particles = [];
let popups = [];
let clearingCells = [];
let wordsFound = [];
let usedWords = new Set(); // words already scored this game — can't be reused
// rev8: the first STARTER_TOTAL letters are dealt out for free (up to
// STARTER_MAX_ACTIVE active at once) so the game isn't brutal from move
// one; once the budget is spent, only solving a word refills a blank slot
const STARTER_TOTAL = 50;
const STARTER_MAX_ACTIVE = 8;
let starterLettersRemaining = STARTER_TOTAL;
// rev9: hitting an empty tray doesn't end the game immediately — a 15s
// grace countdown starts instead, giving the player a window to rearrange
// already-placed grid letters (free, no tray letters needed) into a word.
// Solving one refills a slot and cancels the countdown; letting it expire
// ends the game.
const GRACE_SECONDS = 15;
let graceTimeLeft = null;
let stars = [];
let lastTime = 0;
let hoverCell = null;
let hoverTrash = false;

for(let i=0;i<70;i++){
  stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6+0.3, tw:Math.random()*Math.PI*2});
}

function makeGrid(){
  grid = Array.from({length:GRID_SIZE}, ()=>Array(GRID_SIZE).fill(null));
  placedAt = Array.from({length:GRID_SIZE}, ()=>Array(GRID_SIZE).fill(-999));
}

function isGridFull(){
  for(let r=0;r<GRID_SIZE;r++) for(let c=0;c<GRID_SIZE;c++) if(grid[r][c]===null) return false;
  return true;
}

function currentFallDuration(){
  // rev3 made this 3x slower than rev1/rev2; rev5 slows it another 3x on
  // top of that, so the base curve now runs 9x the original rev1/rev2 pace
  return 9 * Math.max(3, 8 - elapsed*0.015);
}

function makeTraySlot(){
  const d = currentFallDuration();
  // timeLeft counts down each frame (paused while the slot is selected or
  // being dragged); totalDuration is kept alongside it so the countdown
  // ring can still show a fraction-remaining sweep
  return { ch: randomLetter(), timeLeft: d, totalDuration: d, urgentPlayed: false };
}

// ---------- GAME RESET ----------
function startGame(){
  makeGrid();
  score = 0;
  elapsed = 0;
  particles = [];
  popups = [];
  clearingCells = [];
  wordsFound = [];
  usedWords = new Set();
  starterLettersRemaining = STARTER_TOTAL;
  graceTimeLeft = null;
  traySize = Math.min(STARTER_MAX_ACTIVE, starterLettersRemaining);
  selectedSource = null;
  pointerDown = null;
  dragGhost = null;
  // the tray always has TRAY_CAP fixed positions on screen — inactive
  // ones (index >= traySize) are null and drawn as empty placeholders
  tray = new Array(TRAY_CAP).fill(null);
  starterLettersRemaining -= traySize;
  for(let i=0;i<traySize;i++){
    const slot = makeTraySlot();
    // stagger the starting slots' timers so they don't all expire in the
    // same instant if left untouched — an idle tray drains one slot at a
    // time, not all at once
    slot.timeLeft -= i*1.5;
    tray[i] = slot;
  }
  state = 'playing';
  ensureAudio();
  sfxStart();
}

// ---------- INPUT ----------
function canvasCoords(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX-rect.left)*scaleX, y: (e.clientY-rect.top)*scaleY };
}
function gridCellAt(mx,my){
  if(mx<GRID_LEFT || mx>GRID_RIGHT || my<GRID_TOP || my>GRID_BOTTOM) return null;
  const col = Math.floor((mx-GRID_LEFT)/PITCH);
  const row = Math.floor((my-GRID_TOP)/PITCH);
  if(col<0||col>=GRID_SIZE||row<0||row>=GRID_SIZE) return null;
  return {row,col};
}
function traySlotRects(){
  // always TRAY_CAP fixed positions, regardless of how many are currently
  // active — letters never shift around when the tray grows or a slot
  // gets replaced
  const n = TRAY_CAP;
  const totalW = n*TRAY_SLOT + (n-1)*TRAY_GAP;
  const left = (W-totalW)/2;
  const rects = [];
  for(let i=0;i<n;i++){
    rects.push({ x:left+i*(TRAY_SLOT+TRAY_GAP), y:TRAY_Y-TRAY_SLOT/2, w:TRAY_SLOT, h:TRAY_SLOT, index:i });
  }
  return rects;
}
function traySlotAt(mx,my){
  const rects = traySlotRects();
  for(const r of rects){
    if(mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h) return r.index;
  }
  return null;
}
function trashAt(mx,my){
  return Math.abs(mx-TRASH_X) <= TRASH_W/2 && Math.abs(my-TRASH_Y) <= TRASH_H/2;
}

function sameSource(a,b){
  if(!a || !b || a.type!==b.type) return false;
  return a.type==='tray' ? a.index===b.index : (a.row===b.row && a.col===b.col);
}

canvas.addEventListener('mousedown', (e)=>{
  ensureAudio();
  if(state==='title' || state==='gameover'){ return; } // handled on click/mouseup
  if(state!=='playing') return;
  const {x,y} = canvasCoords(e);
  const slotIdx = traySlotAt(x,y);
  if(slotIdx!==null && tray[slotIdx]){
    pointerDown = { source:{type:'tray', index:slotIdx}, downX:x, downY:y, moved:false };
    sfxSelect();
    return;
  }
  const cell = gridCellAt(x,y);
  if(cell && grid[cell.row][cell.col]!==null){
    pointerDown = { source:{type:'grid', row:cell.row, col:cell.col}, downX:x, downY:y, moved:false };
    sfxSelect();
  }
});

canvas.addEventListener('mousemove', (e)=>{
  const {x,y} = canvasCoords(e);
  hoverCell = gridCellAt(x,y);
  hoverTrash = trashAt(x,y);
  if(pointerDown){
    const dx=x-pointerDown.downX, dy=y-pointerDown.downY;
    if(!pointerDown.moved && Math.hypot(dx,dy) > 6){ pointerDown.moved = true; }
    if(pointerDown.moved){
      dragGhost = { source: pointerDown.source, x, y };
    }
  }
});

canvas.addEventListener('mouseleave', ()=>{ hoverCell = null; });

canvas.addEventListener('mouseup', (e)=>{
  if(state==='title' || state==='gameover'){
    startGame();
    return;
  }
  if(state!=='playing'){ pointerDown=null; dragGhost=null; return; }

  const {x,y} = canvasCoords(e);

  if(pointerDown){
    if(pointerDown.moved){
      if(trashAt(x,y)){
        trashLetterAt(pointerDown.source);
      } else {
        const cell = gridCellAt(x,y);
        if(cell) placeLetterAt(pointerDown.source, cell.row, cell.col);
        else sfxDeselect(); // dropped outside the grid — letter goes back
      }
    } else {
      const wasSelected = sameSource(selectedSource, pointerDown.source);
      selectedSource = wasSelected ? null : pointerDown.source;
      if(wasSelected) sfxDeselect();
    }
    pointerDown = null;
    dragGhost = null;
    return;
  }

  if(selectedSource){
    if(trashAt(x,y)){
      trashLetterAt(selectedSource);
    } else {
      const cell = gridCellAt(x,y);
      if(cell) placeLetterAt(selectedSource, cell.row, cell.col);
    }
  }
});

window.addEventListener('keydown', (e)=>{
  if(['Enter',' ','p','P','m','M'].indexOf(e.key)!==-1) e.preventDefault();
  ensureAudio();
  if(!e.repeat){
    if(e.key==='Enter'){
      if(state==='title' || state==='gameover') startGame();
      else if(state==='paused') state='playing';
    }
    if(e.key==='p' || e.key==='P'){
      if(state==='playing') state='paused';
      else if(state==='paused') state='playing';
    }
    if(e.key==='m' || e.key==='M'){ muted = !muted; }
  }
});

// ---------- PLACEMENT + WORD DETECTION ----------
function trashLetterAt(source){
  if(source.type==='tray'){
    // rev8: trashing a tray letter is a free instant re-roll — it always
    // gets replaced right away, unlimited, not drawn from the starter
    // budget. The scarcity is specifically for wasted placements and
    // missed timers, not for deliberately discarding a letter you don't want.
    if(!tray[source.index]) return;
    tray[source.index] = makeTraySlot();
    sfxTrash();
    selectedSource = null;
  } else {
    if(grid[source.row][source.col]===null) return;
    grid[source.row][source.col] = null;
    sfxTrash();
    selectedSource = null;
  }
}

function placeLetterAt(source, row, col){
  if(grid[row][col] !== null){ sfxInvalid(); return; }

  let ch;
  const fromTray = source.type==='tray';
  if(fromTray){
    if(!tray[source.index]) return;
    ch = tray[source.index].ch;
    // using a tray letter leaves that slot blank — refilled below only if
    // this placement completes a word, or (rev8) for free while the
    // starter budget still has letters left. Otherwise it stays empty
    // until some future word solve fills it.
    tray[source.index] = null;
    traySize--;
  } else {
    ch = grid[source.row][source.col];
    if(ch===null) return;
    grid[source.row][source.col] = null;
  }

  grid[row][col] = ch;
  placedAt[row][col] = elapsed;
  sfxPlace();
  selectedSource = null;

  const matched = runWordDetection(row,col);
  if(matched.length>0){
    matched.forEach(m=> { wordsFound.push(m.word); usedWords.add(m.word); });
    refillOneGapIfAllowed(true);
  } else if(fromTray){
    refillOneGapIfAllowed(false);
  }
  // an empty tray no longer ends the game immediately — see the grace
  // countdown in update()
}

function inBounds(r,c){ return r>=0 && r<GRID_SIZE && c>=0 && c<GRID_SIZE; }

function runWordDetection(row,col){
  // rev6: diagonals are back (rev5 had removed them), plus the original
  // horizontal/vertical axes — each of the 4 checked in both directions
  // below. Words must still be strictly adjacent with no gaps, length 4-8.
  const axes = [[0,1],[1,0],[1,1],[1,-1]];
  const foundKeys = new Set();
  const matchedWords = [];
  const allMatchedCells = new Set();
  const alreadyUsedHits = new Set(); // real words found, but reused this game

  function checkSubstrings(str, cellsInOrder){
    const n = str.length;
    for(let len=4; len<=8 && len<=n; len++){
      for(let start=0; start+len<=n; start++){
        const subCells = cellsInOrder.slice(start,start+len);
        const includesNew = subCells.some(([r,c])=>r===row && c===col);
        if(!includesNew) continue;
        const sub = str.substring(start,start+len);
        if(DICTIONARY.has(sub)){
          if(usedWords.has(sub)){
            alreadyUsedHits.add(sub);
            continue;
          }
          const key = subCells.map(rc=>rc.join(',')).sort().join('|');
          if(!foundKeys.has(key)){
            foundKeys.add(key);
            matchedWords.push({word:sub, cells:subCells});
            subCells.forEach(([r,c])=>allMatchedCells.add(r+','+c));
          }
        }
      }
    }
  }

  for(const [dr,dc] of axes){
    let sr=row, sc=col;
    while(inBounds(sr-dr,sc-dc) && grid[sr-dr][sc-dc]) { sr-=dr; sc-=dc; }
    const cells = [];
    let r=sr, c=sc;
    while(inBounds(r,c) && grid[r][c]){ cells.push([r,c]); r+=dr; c+=dc; }
    if(cells.length < 4) continue;
    const runStr = cells.map(([r,c])=>grid[r][c]).join('');
    checkSubstrings(runStr, cells);
    checkSubstrings(runStr.split('').reverse().join(''), cells.slice().reverse());
  }

  if(matchedWords.length===0){
    if(alreadyUsedHits.size>0){
      const p = cellCenter(row,col);
      const word = [...alreadyUsedHits].sort((a,b)=>b.length-a.length)[0];
      addPopup(p.x, p.y-14, word+' ALREADY USED', 'rgba(255,255,255,0.55)');
    }
    return matchedWords;
  }

  let gained = 0;
  matchedWords.forEach(m=>{ gained += SCORE_FOR_LENGTH[m.word.length] || 0; });
  if(matchedWords.length>1) gained += (matchedWords.length-1)*50;
  score += gained;
  if(score>highScore) highScore = score;

  matchedWords.forEach(m=>{
    const cx = m.cells.reduce((s,[r,c])=>s+cellCenter(r,c).x,0)/m.cells.length;
    const cy = m.cells.reduce((s,[r,c])=>s+cellCenter(r,c).y,0)/m.cells.length;
    addPopup(cx, cy, m.word+' +'+(SCORE_FOR_LENGTH[m.word.length]||0), CLEAR_COLOR);
    m.cells.forEach(([r,c])=>{
      const p = cellCenter(r,c);
      burst(p.x,p.y,CLEAR_COLOR,10);
    });
    sfxWordFound(m.word.length);
  });

  allMatchedCells.forEach(key=>{
    const [r,c] = key.split(',').map(Number);
    clearingCells.push({row:r, col:c, startTime:elapsed});
    grid[r][c] = null;
  });

  return matchedWords;
}

function endGame(){
  state = 'gameover';
  if(score>highScore){ highScore=score; localStorage.setItem('wordGameHighScore', String(highScore)); }
  sfxGameOver();
}

function missSlot(slotIndex){
  sfxMiss();
  // a missed timer leaves that fixed position blank — refilled for free
  // only if the rev8 starter budget still has letters left, otherwise
  // only solving a word brings it back. An empty tray no longer ends the
  // game immediately — see the grace countdown in update().
  tray[slotIndex] = null;
  traySize--;
  refillOneGapIfAllowed(false);
}

function firstBlankGap(){
  for(let i=0;i<TRAY_CAP;i++){
    if(tray[i]===null) return i;
  }
  return -1;
}

// Fills one blank tray slot, if any exist and it's actually allowed to.
// earnedByWord=true (a word was just solved) always succeeds when there's
// a gap — that's the permanent, unlimited way to refill. Otherwise this is
// the rev8 starter-budget top-up: only while free letters remain, and only
// up to STARTER_MAX_ACTIVE active at once.
function refillOneGapIfAllowed(earnedByWord){
  const gapIdx = firstBlankGap();
  if(gapIdx === -1) return false;
  if(earnedByWord){
    tray[gapIdx] = makeTraySlot();
    traySize++;
    sfxGrow();
    return true;
  }
  if(starterLettersRemaining > 0 && traySize < STARTER_MAX_ACTIVE){
    tray[gapIdx] = makeTraySlot();
    traySize++;
    starterLettersRemaining--;
    sfxGrow();
    return true;
  }
  return false;
}

// ---------- PARTICLES / POPUPS ----------
function cellCenter(row,col){
  return { x: GRID_LEFT + col*PITCH + CELL/2, y: GRID_TOP + row*PITCH + CELL/2 };
}
function burst(x,y,color,count){
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = 30+Math.random()*90;
    particles.push({ x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:0.4+Math.random()*0.35, maxLife:0.75, color });
  }
}
function addPopup(x,y,text,color){
  popups.push({x,y,text,color,life:1.0,maxLife:1.0});
}

// ---------- UPDATE ----------
function update(dt){
  if(state==='playing') elapsed += dt;

  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=150*dt; p.life-=dt; });
  particles = particles.filter(p=>p.life>0);
  popups.forEach(p=>{ p.y -= 22*dt; p.life -= dt; });
  popups = popups.filter(p=>p.life>0);
  clearingCells = clearingCells.filter(cc => elapsed - cc.startTime < 0.4);

  if(state!=='playing') return;

  if(isGridFull()){
    endGame();
    return;
  }

  // rev9: an empty tray starts (or continues) a 15s grace countdown rather
  // than ending the game outright — recovers (timer clears) the moment
  // traySize goes back above 0, however that happens.
  if(traySize <= 0){
    if(graceTimeLeft === null) graceTimeLeft = GRACE_SECONDS;
    graceTimeLeft -= dt;
    if(graceTimeLeft <= 0){
      endGame();
      return;
    }
  } else {
    graceTimeLeft = null;
  }

  // rev6: tray timers are a countdown (timeLeft) that ticks down each
  // frame, except while that slot is selected or being dragged — picking
  // a letter up pauses its clock until it's placed or put back down.
  // Positions are fixed now (missSlot replaces in place), so plain forward
  // iteration is safe.
  for(let i=0;i<tray.length;i++){
    const slot = tray[i];
    if(!slot) continue;
    const isPaused = (selectedSource && selectedSource.type==='tray' && selectedSource.index===i)
                   || (pointerDown && pointerDown.source.type==='tray' && pointerDown.source.index===i)
                   || (dragGhost && dragGhost.source.type==='tray' && dragGhost.source.index===i);
    if(isPaused) continue;
    slot.timeLeft -= dt;
    if(!slot.urgentPlayed && slot.timeLeft/slot.totalDuration < 0.3){
      slot.urgentPlayed = true;
      sfxUrgent();
    }
    if(slot.timeLeft <= 0){
      missSlot(i);
    }
  }
}

// ---------- RENDER ----------
function drawStarfield(t){
  stars.forEach(s=>{
    const a = 0.4 + Math.sin(t*0.001 + s.tw)*0.3;
    ctx.fillStyle = `rgba(180,200,255,${Math.max(0,a)})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawMatrixGrid(){
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,242,0.28)';
  ctx.lineWidth = 1;
  for(let i=0;i<=GRID_SIZE;i++){
    const x = GRID_LEFT + i*PITCH - GAP/2;
    const xc = clamp(x, GRID_LEFT, GRID_RIGHT);
    ctx.beginPath(); ctx.moveTo(xc, GRID_TOP); ctx.lineTo(xc, GRID_BOTTOM); ctx.stroke();
    const y = GRID_TOP + i*PITCH - GAP/2;
    const yc = clamp(y, GRID_TOP, GRID_BOTTOM);
    ctx.beginPath(); ctx.moveTo(GRID_LEFT, yc); ctx.lineTo(GRID_RIGHT, yc); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,255,242,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(GRID_LEFT-1, GRID_TOP-1, GRID_W+2, GRID_W+2);
  ctx.restore();
}

function drawGrid(){
  drawMatrixGrid();
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const x = GRID_LEFT + c*PITCH;
      const y = GRID_TOP + r*PITCH;
      let letter = grid[r][c];
      const isHover = hoverCell && hoverCell.row===r && hoverCell.col===c && !letter &&
                      (selectedSource!==null || dragGhost!==null);
      const clearing = clearingCells.find(cc=>cc.row===r && cc.col===c);
      const beingDragged = dragGhost && dragGhost.source.type==='grid' &&
                            dragGhost.source.row===r && dragGhost.source.col===c;
      const isSelected = selectedSource && selectedSource.type==='grid' &&
                          selectedSource.row===r && selectedSource.col===c;
      if(beingDragged) letter = null; // drawn as the ghost instead

      ctx.save();
      if(letter){
        const age = elapsed - placedAt[r][c];
        const scale = age<0.15 ? clamp(0.5 + (age/0.15)*0.5, 0.5, 1) : 1;
        const cx = x+CELL/2, cy = y+CELL/2;
        ctx.translate(cx,cy);
        ctx.scale(scale,scale);
        ctx.translate(-cx,-cy);

        ctx.fillStyle = clearing ? 'rgba(255,230,0,0.28)' : (isSelected ? 'rgba(255,230,0,0.22)' : TILE_COLORS.fill);
        ctx.strokeStyle = clearing || isSelected ? CLEAR_COLOR : TILE_COLORS.border;
        ctx.lineWidth = 2;
        ctx.shadowColor = clearing || isSelected ? CLEAR_COLOR : TILE_COLORS.border;
        ctx.shadowBlur = clearing || isSelected ? 16 : 6;
        roundRect(x+2,y+2,CELL-4,CELL-4,6);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = clearing ? '#fffbe0' : TILE_COLORS.text;
        ctx.font = 'bold 19px "Press Start 2P", monospace';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(letter, cx, cy+2);
      } else if(isHover){
        ctx.fillStyle = 'rgba(255,230,0,0.10)';
        ctx.strokeStyle = 'rgba(255,230,0,0.8)';
        ctx.lineWidth = 2;
        roundRect(x+2,y+2,CELL-4,CELL-4,6);
        ctx.fill(); ctx.stroke();
      }
      ctx.restore();
    }
  }
}

function drawTray(){
  const rects = traySlotRects();
  ctx.save();
  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.textAlign='center';
  ctx.fillText('LETTER TRAY — DRAG OR CLICK', W/2, TRAY_Y - TRAY_SLOT/2 - 12);

  rects.forEach(r=>{
    const slot = tray[r.index];
    const cx = r.x + r.w/2, cy = r.y + r.h/2;

    if(!slot){
      // inactive fixed position — dim empty placeholder, still occupying
      // its permanent spot so nothing else ever shifts to fill it
      ctx.save();
      ctx.translate(cx,cy);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.arc(0,0,r.w/2-6,0,Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      return;
    }

    const beingDragged = dragGhost && dragGhost.source.type==='tray' && dragGhost.source.index===r.index;
    if(beingDragged) return; // drawn as ghost instead, below

    const selected = selectedSource && selectedSource.type==='tray' && selectedSource.index===r.index;
    // a selected slot's timer is paused (see update()) — always render it
    // yellow regardless of how close to expiring it was, so "frozen" reads
    // clearly rather than mixing in the red urgent styling
    const t = clamp(1 - slot.timeLeft/slot.totalDuration, 0, 1);
    const urgent = !selected && t > 0.7;

    ctx.save();
    ctx.translate(cx,cy);

    ctx.strokeStyle = selected ? '#ffe600' : (urgent ? 'rgba(255,43,78,0.9)' : 'rgba(0,255,242,0.7)');
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0,0,r.w/2, -Math.PI/2, -Math.PI/2 + (1-t)*Math.PI*2);
    ctx.stroke();

    ctx.fillStyle = selected ? 'rgba(255,230,0,0.25)' : 'rgba(0,10,20,0.6)';
    ctx.strokeStyle = selected ? '#ffe600' : (urgent ? '#ff2b4e' : '#00fff2');
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = selected ? 16 : 10;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0,0,r.w/2-6,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#eafffe';
    ctx.font = 'bold 16px "Press Start 2P", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(slot.ch, 0, 2);

    const remaining = Math.max(0, slot.timeLeft);
    ctx.fillStyle = selected ? '#ffe600' : (urgent ? '#ff2b4e' : 'rgba(255,255,255,0.55)');
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillText(remaining.toFixed(1)+'s', 0, r.w/2 - 6 + 10);

    ctx.restore();
  });
  ctx.restore();
}

function drawTrashCan(){
  const active = dragGhost !== null; // a drag is in progress
  const hot = active && hoverTrash;

  ctx.save();
  ctx.translate(TRASH_X, TRASH_Y);

  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle = hot ? '#ff2b4e' : 'rgba(255,255,255,0.35)';
  ctx.textAlign='center';
  ctx.fillText('TRASH', 0, -TRASH_H/2 - 14);

  const glowColor = hot ? '#ff2b4e' : (active ? '#ffe600' : 'rgba(255,255,255,0.3)');
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 2;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = hot ? 16 : (active ? 8 : 0);

  // lid + handle
  roundRect(-26, -TRASH_H/2, 52, 10, 3);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-8, -TRASH_H/2);
  ctx.lineTo(-8, -TRASH_H/2-8);
  ctx.lineTo(8, -TRASH_H/2-8);
  ctx.lineTo(8, -TRASH_H/2);
  ctx.stroke();

  // tapered body
  ctx.beginPath();
  ctx.moveTo(-22, -TRASH_H/2+12);
  ctx.lineTo(-18, TRASH_H/2);
  ctx.lineTo(18, TRASH_H/2);
  ctx.lineTo(22, -TRASH_H/2+12);
  ctx.closePath();
  ctx.stroke();

  // ridge lines
  ctx.beginPath();
  ctx.moveTo(-9, -TRASH_H/2+18); ctx.lineTo(-7, TRASH_H/2-8);
  ctx.moveTo(0, -TRASH_H/2+18); ctx.lineTo(0, TRASH_H/2-8);
  ctx.moveTo(9, -TRASH_H/2+18); ctx.lineTo(7, TRASH_H/2-8);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function dragGhostChar(){
  if(!dragGhost) return null;
  const s = dragGhost.source;
  if(s.type==='tray') return tray[s.index] ? tray[s.index].ch : null;
  return grid[s.row][s.col];
}

function drawDragGhost(){
  if(!dragGhost) return;
  const ch = dragGhostChar();
  if(!ch) return;
  ctx.save();
  ctx.translate(dragGhost.x, dragGhost.y);
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = 'rgba(255,230,0,0.25)';
  ctx.strokeStyle = '#ffe600';
  ctx.shadowColor = '#ffe600';
  ctx.shadowBlur = 18;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,TRAY_SLOT/2-4,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fffbe0';
  ctx.font = 'bold 18px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ch, 0, 2);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawWordList(){
  ctx.save();
  ctx.strokeStyle='rgba(255,0,230,0.25)';
  ctx.beginPath(); ctx.moveTo(GRID_LEFT, WORDLIST_TOP-4); ctx.lineTo(GRID_RIGHT, WORDLIST_TOP-4); ctx.stroke();

  ctx.font = '9px "Press Start 2P", monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  const maxWidth = GRID_W;
  const midY = WORDLIST_TOP + (WORDLIST_BOTTOM-WORDLIST_TOP)/2;
  const label = 'WORDS FOUND ('+wordsFound.length+'): ';

  ctx.fillStyle = '#ff9be8';
  if(wordsFound.length===0){
    ctx.fillText(label + '(none yet)', GRID_LEFT, midY);
    ctx.restore();
    return;
  }

  // Show as many of the most-recent words as fit, prefixed with "..." if
  // older ones had to be dropped.
  let shownCount = 1;
  for(let n=1; n<=wordsFound.length; n++){
    const tail = wordsFound.slice(wordsFound.length-n).join(', ');
    const truncated = n < wordsFound.length;
    const text = label + (truncated ? '… ' : '') + tail;
    if(ctx.measureText(text).width > maxWidth) break;
    shownCount = n;
  }
  const tail = wordsFound.slice(wordsFound.length-shownCount).join(', ');
  const truncated = shownCount < wordsFound.length;
  ctx.fillText(label + (truncated ? '… ' : '') + tail, GRID_LEFT, midY);
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}
function drawPopups(){
  popups.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD(){
  ctx.save();
  ctx.font='14px "Press Start 2P", monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#00fff2';
  ctx.shadowColor='#00fff2'; ctx.shadowBlur=6;
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), 24, 22);
  ctx.shadowBlur=0;

  ctx.textAlign='center';
  ctx.fillStyle='#ffe600';
  ctx.shadowColor='#ffe600'; ctx.shadowBlur=6;
  ctx.fillText('HIGH '+String(highScore).padStart(6,'0'), W/2, 22);
  ctx.shadowBlur=0;

  ctx.textAlign='right';
  ctx.fillStyle='#ff2b4e';
  ctx.shadowColor='#ff2b4e'; ctx.shadowBlur=6;
  ctx.font='10px "Press Start 2P", monospace';
  ctx.fillText('LETTERS '+traySize, W-24, 24);
  ctx.shadowBlur=0;

  if(starterLettersRemaining > 0){
    ctx.font='7px "Press Start 2P", monospace';
    ctx.fillStyle='rgba(57,255,20,0.65)';
    ctx.fillText('STARTER SUPPLY '+starterLettersRemaining, W-24, 42);
  }

  ctx.strokeStyle='rgba(0,255,242,0.25)';
  ctx.beginPath(); ctx.moveTo(20,HUD_DIVIDER_Y); ctx.lineTo(W-20,HUD_DIVIDER_Y); ctx.stroke();
  ctx.restore();
}

function drawGraceWarning(){
  if(graceTimeLeft === null) return;
  // pulsing countdown shown over the (now-empty) tray area — rearranging
  // grid letters into a word before this runs out is the only way back
  const pulse = 0.6 + 0.4*Math.sin(elapsed*6);
  ctx.save();
  ctx.font = 'bold 13px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,43,78,${pulse})`;
  ctx.shadowColor = '#ff2b4e';
  ctx.shadowBlur = 14;
  ctx.fillText('TRAY EMPTY — FORM A WORD IN '+Math.max(0,graceTimeLeft).toFixed(1)+'s', W/2, TRAY_Y);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function centeredText(text, y, size, color, glow){
  ctx.font = size+'px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=color;
  if(glow){ ctx.shadowColor=color; ctx.shadowBlur=glow; }
  ctx.fillText(text, W/2, y);
  ctx.shadowBlur=0;
}

function drawTitleScreen(t){
  drawStarfield(t);
  centeredText('WORD GAME', H/2-160, 34, '#00fff2', 18);
  const blink = Math.floor(Date.now()/500)%2===0;
  if(blink) centeredText('CLICK OR PRESS ENTER TO START', H/2-90, 13, '#ffe600', 10);
  centeredText('A TRAY OF LETTERS SITS AT THE TOP', H/2-40, 11, '#ff00e6', 6);
  centeredText('DRAG ONE DOWN, OR CLICK IT THEN CLICK A CELL', H/2-22, 9, '#8a7fc0', 0);
  centeredText('PLACED LETTERS CAN BE MOVED THE SAME WAY TOO', H/2-4, 9, '#8a7fc0', 0);
  centeredText('SELECTING A LETTER PAUSES ITS TIMER', H/2+14, 9, '#8a7fc0', 0);
  centeredText('DRAG A LETTER TO THE TRASH FOR A FREE INSTANT SWAP', H/2+32, 9, '#8a7fc0', 0);
  centeredText('SPELL 4-8 LETTER WORDS FROM ADJACENT LETTERS, NO GAPS', H/2+50, 9, '#8a7fc0', 0);
  centeredText('ACROSS, DOWN, OR DIAGONAL — EITHER DIRECTION COUNTS', H/2+68, 9, '#8a7fc0', 0);
  centeredText('EACH WORD CAN ONLY SCORE ONCE PER GAME', H/2+86, 9, '#8a7fc0', 0);
  centeredText('YOUR FIRST 50 LETTERS ARE FREE (UP TO 8 IN THE TRAY AT ONCE)', H/2+104, 9, '#8a7fc0', 0);
  centeredText('AFTER THAT, ONLY A SOLVED WORD REFILLS A TRAY SLOT', H/2+122, 9, '#8a7fc0', 0);
  centeredText('TRAY EMPTY? YOU GET 15s TO REARRANGE GRID LETTERS INTO A WORD', H/2+140, 9, '#8a7fc0', 0);
  centeredText('GAME OVER IF THE GRID FILLS, OR TIME RUNS OUT ON AN EMPTY TRAY', H/2+158, 9, '#8a7fc0', 0);
  centeredText('HIGH SCORE '+String(highScore).padStart(6,'0'), H/2+192, 12, '#39ff14', 6);
}

function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,H);
  centeredText('PAUSED', H/2, 26, '#ffe600', 14);
  centeredText('PRESS P TO RESUME', H/2+36, 10, '#00fff2', 6);
}

function drawGameOverScreen(t){
  drawStarfield(t);
  ctx.fillStyle='rgba(5,1,15,0.75)';
  ctx.fillRect(0,0,W,H);
  centeredText('GAME OVER', H/2-70, 30, '#ff2b4e', 16);
  centeredText('SCORE '+String(score).padStart(6,'0'), H/2-16, 16, '#00fff2', 8);
  centeredText('HIGH SCORE '+String(highScore).padStart(6,'0'), H/2+14, 12, '#ffe600', 6);
  const blink = Math.floor(Date.now()/500)%2===0;
  if(blink) centeredText('CLICK OR PRESS ENTER TO RETRY', H/2+70, 12, '#39ff14', 8);
}

function render(t){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05010f';
  ctx.fillRect(0,0,W,H);

  if(state==='title'){
    drawTitleScreen(t);
    return;
  }
  if(state==='gameover'){
    drawGameOverScreen(t);
    return;
  }

  drawStarfield(t);
  drawHUD();
  drawTray();
  drawGrid();
  drawTrashCan();
  drawDragGhost();
  drawWordList();
  drawParticles();
  drawPopups();
  drawGraceWarning();

  if(state==='paused') drawPauseOverlay();
}

// ---------- MAIN LOOP ----------
function loop(now){
  if(!lastTime) lastTime = now;
  let dt = (now-lastTime)/1000;
  if(dt>0.05) dt = 0.05;
  lastTime = now;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
