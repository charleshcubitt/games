<head>
<meta charset="UTF-8">

<title>WORD GAME // REV 15</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Word Game">
<meta name="theme-color" content="#05010f">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --neon-cyan:#00fff2;
  --neon-magenta:#ff00e6;
  --neon-yellow:#ffe600;
  --neon-green:#39ff14;
  --neon-red:#ff2b4e;
  --bg-deep:#05010f;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
html,body{
  margin:0;padding:0;width:100%;height:100%;
  background:#05010f;
  display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P','Courier New',monospace;
  color:var(--neon-cyan);
  overflow:hidden;
  overscroll-behavior:none;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
#stage{
  position:relative;
  /* rev12: canvas is portrait (ratio 0.64) instead of rev11's landscape
     960x640 -- width is capped by height*ratio so it never overflows a
     tall-but-narrow phone screen. rev15: canvas grew taller (640x1150) to
     fit the name-entry/leaderboard screens, so the ratio narrowed a bit. */
  width:min(100vw, 55.65vh);
  aspect-ratio:640/1150;
  background:#000;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,255,242,0.15);
}
canvas{
  display:block;
  width:100%;
  height:100%;
  image-rendering:pixelated;
  background:#000;
  touch-action:none;
}
#scanlines{
  position:absolute;inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.035) 0px,
    rgba(255,255,255,0.035) 1px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0) 3px
  );
  mix-blend-mode:overlay;
}
#vignette{
  position:absolute;inset:0;
  pointer-events:none;
  box-shadow:inset 0 0 100px 30px rgba(0,0,0,0.85);
}
#rotateHint{
  position:fixed;inset:0;
  background:#05010f;
  color:var(--neon-yellow);
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;
  text-align:center;
  gap:14px;
  font-size:12px;
  line-height:1.8;
  padding:20px;
  z-index:100;
}
@media (orientation:landscape) and (pointer:coarse){
  #rotateHint{ display:flex; }
  #stage{ display:none; }
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="640" height="1150"></canvas>

  <div id="vignette"></div>
</div>
<div id="rotateHint">

</div>

// ---------- CANVAS SETUP ----------
const canvas = document.getElementById('game');

// ---------- AUDIO ----------
let actx = null;
let muted = false;
function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; }
  }
  if(actx && actx.state==='suspended'){ actx.resume(); }
}
function beep(freq, dur, type, vol, delay){
  if(muted || !actx) return;
  type = type||'square'; vol = vol===undefined?0.15:vol; delay = delay||0;
  const t = actx.currentTime + delay;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sfxPlace(){ beep(520,0.05,'square',0.10,0); }
function sfxInvalid(){ beep(160,0.08,'sawtooth',0.10,0); }

  const tones = [523,659,784,1046,1318];
  const n = Math.min(len-2, tones.length);
  for(let i=0;i<n;i++) beep(tones[i],0.10,'triangle',0.15,i*0.06);
}
function sfxGrow(){ beep(880,0.06,'sine',0.12,0); beep(1100,0.08,'sine',0.10,0.05); }
function sfxMiss(){ beep(150,0.25,'sawtooth',0.18,0); }
function sfxGameOver(){ [420,340,260,160].forEach((f,i)=>beep(f,0.22,'sawtooth',0.18,i*0.16)); }

// ---------- GRID / LAYOUT CONSTANTS ----------
// rev12: portrait canvas instead of rev11's landscape 960x640. The grid
// gets bigger cells (more finger-friendly) since there's no tray/trash
// sharing its row anymore; everything stacks vertically instead.
// rev15: grid shrunk to 8x8 (was 10x10) so cells can grow even bigger, and
// the tray shrunk to 8 slots (was 10) to match — both maximized for the
// smaller board. Canvas grew taller (1150, was 1000) to fit the new
// name-entry/leaderboard screens without cramping anything else.
const GRID_SIZE = 8;
const CELL = 72;
const GAP = 6;
const PITCH = CELL + GAP;
const GRID_W = GRID_SIZE*CELL + (GRID_SIZE-1)*GAP;
const GRID_LEFT = (W-GRID_W)/2;
const GRID_TOP = 150;
const GRID_RIGHT = GRID_LEFT + GRID_W;
const GRID_BOTTOM = GRID_TOP + GRID_W;
const HUD_DIVIDER_Y = 64;
const TRAY_Y = 104;
const TRAY_SLOT = 64;
const TRAY_GAP = 8;

// trash can — no longer beside the grid (no room for that in portrait);
// it now sits in its own row directly below the grid
const TRASH_W = 72, TRASH_H = 82;
const TRASH_X = W/2;
const TRASH_Y = GRID_BOTTOM + 70;

// rev15: the old single-line word list is replaced by a scrolling ticker
// lane with its own dedicated band below the trash can
const TICKER_LABEL_Y = TRASH_Y + TRASH_H/2 + 30;
const TICKER_LANE_TOP = TICKER_LABEL_Y + 16;
const TICKER_LANE_H = 60;
const TICKER_LEFT = GRID_LEFT;
const TICKER_RIGHT = GRID_RIGHT;
const SCROLL_PX_PER_SEC = 55;

const TILE_COLORS = { fill:'rgba(0,255,242,0.08)', border:'#00fff2', text:'#eafffe' };
const CLEAR_COLOR = '#ffe600';
const TRAY_CAP = 8;

// ---------- LETTER FREQUENCY BAG ----------
// rev3: letter weights derived from actual per-letter frequency across the
// game's own dictionary (not generic English/Scrabble frequency), so the
// tray favors letters this specific word list can actually use — makes the
// game easier since rare-in-dictionary letters show up less often
// rev14: vowels (A,E,I,O,U) bumped slightly relative to rev1-12's weights,
// making it a little easier to keep a workable mix of vowels in the tray
const LETTER_FREQ = {A:9,B:2,C:4,D:4,E:13,F:2,G:3,H:2,I:8,J:1,K:1,L:5,M:3,N:6,O:7,P:3,Q:1,R:8,S:8,T:7,U:4,V:1,W:1,X:1,Y:2,Z:1};
const LETTER_BAG = Object.entries(LETTER_FREQ).flatMap(([ch,n])=>Array(n).fill(ch));
function randomLetter(){ return LETTER_BAG[Math.floor(Math.random()*LETTER_BAG.length)]; }

// rev15: word length window narrowed to 3-6 (was 4-8) to match the smaller
// 8x8 board; scoring rescaled to the new range
const MIN_WORD_LEN = 3;
const MAX_WORD_LEN = 6;
const SCORE_FOR_LENGTH = {3:30,4:60,5:110,6:180};

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

// ---------- STATE ----------
// rev15: 'nameentry' is a new state between 'title' and 'playing' where the
// player sets their 3-letter name before a game starts
let state = 'title'; // title | nameentry | playing | paused | gameover
let grid, placedAt;
let tray = []; // [{ch, startTime, duration}]
let traySize = 5;
// A "letter source" is either {type:'tray', index} or {type:'grid', row, col} —
// rev4 lets you pick up a letter from the tray OR from an already-placed
// grid cell and move it, via the same click-click / drag mechanism.
let selectedSource = null;
let pointerDown = null; // {source, downX, downY, moved}
let dragGhost = null; // {source, x, y}
let score = 0;
let highScore = parseInt(localStorage.getItem('wordGameHighScore')||'0',10) || 0;
let elapsed = 0;
let particles = [];
let popups = [];
let clearingCells = [];
let wordsFound = [];
let usedWords = new Set(); // words already scored this game — can't be reused
// rev8: the first STARTER_TOTAL letters are dealt out for free (up to
// STARTER_MAX_ACTIVE active at once) so the game isn't brutal from move
// one; once the budget is spent, only solving a word refills a blank slot
const STARTER_TOTAL = 100;
const STARTER_MAX_ACTIVE = 8;
let starterLettersRemaining = STARTER_TOTAL;
// rev9: hitting an empty tray doesn't end the game immediately — a 15s
// grace countdown starts instead, giving the player a window to rearrange
// already-placed grid letters (free, no tray letters needed) into a word.
// Solving one refills a slot and cancels the countdown; letting it expire
// ends the game.
const GRACE_SECONDS = 120;
let graceTimeLeft = null;
let stars = [];
let lastTime = 0;
let hoverCell = null;
let hoverTrash = false;

// rev15: 3-letter player name, set once at the name-entry screen and
// reused across replays (tap PLAY AGAIN doesn't ask again this session)
let playerName = ['A','A','A'];

// rev15: ranked local leaderboard, persisted per-device via localStorage
// (see word-game-scores/README.md for why this isn't pushed to the repo
// automatically)
const LEADERBOARD_KEY = 'wordGameLeaderboard';
function loadLeaderboard(){
  try{
    const raw = localStorage.getItem(LEADERBOARD_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch(e){ return []; }
}
function saveLeaderboard(list){
  try{ localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(list)); }catch(e){}
}
function recordScore(name, finalScore){
  const list = loadLeaderboard();
  list.push({ name, score: finalScore, date: new Date().toISOString() });
  list.sort((a,b)=>b.score-a.score);
  const top10 = list.slice(0,10);
  saveLeaderboard(top10);
  return top10;
}
let leaderboard = loadLeaderboard();

let toastText = null, toastUntil = 0;
function showToast(text, ms){ toastText = text; toastUntil = Date.now() + (ms||1500); }

function copyLeaderboardToClipboard(){
  const payload = JSON.stringify({ scores: leaderboard }, null, 2);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(payload)
      .then(()=> showToast('SCORES COPIED TO CLIPBOARD', 1800))
      .catch(()=> showToast('COPY FAILED', 1800));

}

for(let i=0;i<70;i++){
  stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6+0.3, tw:Math.random()*Math.PI*2});
}

function makeGrid(){
  grid = Array.from({length:GRID_SIZE}, ()=>Array(GRID_SIZE).fill(null));
  placedAt = Array.from({length:GRID_SIZE}, ()=>Array(GRID_SIZE).fill(-999));
}

function isGridFull(){
  for(let r=0;r<GRID_SIZE;r++) for(let c=0;c<GRID_SIZE;c++) if(grid[r][c]===null) return false;
  return true;
}

function currentFallDuration(){
  // rev3 made this 3x slower than rev1/rev2; rev5 slows it another 3x on
  // top of that, so the base curve now runs 9x the original rev1/rev2 pace
  return 9 * Math.max(3, 8 - elapsed*0.015);
}

function makeTraySlot(){
  const d = currentFallDuration();
  // timeLeft counts down each frame (paused while the slot is selected or
  // being dragged); totalDuration is kept alongside it so the countdown
  // ring can still show a fraction-remaining sweep
  return { ch: randomLetter(), timeLeft: d, totalDuration: d, urgentPlayed: false };
}

// ---------- GAME RESET ----------
function startGame(){
  makeGrid();
  score = 0;
  elapsed = 0;
  particles = [];
  popups = [];
  clearingCells = [];
  wordsFound = [];
  usedWords = new Set();
  starterLettersRemaining = STARTER_TOTAL;
  graceTimeLeft = null;
  traySize = Math.min(STARTER_MAX_ACTIVE, starterLettersRemaining);
  selectedSource = null;
  pointerDown = null;
  dragGhost = null;
  // the tray always has TRAY_CAP fixed positions on screen — inactive
  // ones (index >= traySize) are null and drawn as empty placeholders
  tray = new Array(TRAY_CAP).fill(null);
  starterLettersRemaining -= traySize;
  for(let i=0;i<traySize;i++){
    const slot = makeTraySlot();
    // stagger the starting slots' timers so they don't all expire in the
    // same instant if left untouched — an idle tray drains one slot at a
    // time, not all at once
    slot.timeLeft -= i*1.5;
    tray[i] = slot;
  }
  state = 'playing';
  ensureAudio();
  sfxStart();
}

// ---------- INPUT ----------
// rev11: mouse and touch both funnel through the same onPointerDown/Move/Up
// functions below, fed by clientX/clientY pulled from whichever event type
// fired — the drag/select/place/trash logic doesn't care how the
// coordinates were obtained, so touch needed no separate game logic at all.
function canvasCoords(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (clientX-rect.left)*scaleX, y: (clientY-rect.top)*scaleY };
}
function gridCellAt(mx,my){
  if(mx<GRID_LEFT || mx>GRID_RIGHT || my<GRID_TOP || my>GRID_BOTTOM) return null;
  const col = Math.floor((mx-GRID_LEFT)/PITCH);
  const row = Math.floor((my-GRID_TOP)/PITCH);
  if(col<0||col>=GRID_SIZE||row<0||row>=GRID_SIZE) return null;
  return {row,col};
}
function traySlotRects(){
  // always TRAY_CAP fixed positions, regardless of how many are currently
  // active — letters never shift around when the tray grows or a slot
  // gets replaced
  const n = TRAY_CAP;
  const totalW = n*TRAY_SLOT + (n-1)*TRAY_GAP;
  const left = (W-totalW)/2;
  const rects = [];
  for(let i=0;i<n;i++){
    rects.push({ x:left+i*(TRAY_SLOT+TRAY_GAP), y:TRAY_Y-TRAY_SLOT/2, w:TRAY_SLOT, h:TRAY_SLOT, index:i });
  }
  return rects;
}
function traySlotAt(mx,my){
  const rects = traySlotRects();
  for(const r of rects){
    if(mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h) return r.index;
  }
  return null;
}
function trashAt(mx,my){
  return Math.abs(mx-TRASH_X) <= TRASH_W/2 && Math.abs(my-TRASH_Y) <= TRASH_H/2;
}

function sameSource(a,b){
  if(!a || !b || a.type!==b.type) return false;
  return a.type==='tray' ? a.index===b.index : (a.row===b.row && a.col===b.col);
}

// rev14: touch drags get a bigger move-threshold (finger presses are less
// precise than a mouse) and a visual+hit-test "lift" so the dragged letter
// renders above the fingertip instead of directly under it, where the
// finger itself would otherwise block the view of the drop target.
const DRAG_THRESHOLD_MOUSE = 6;
const DRAG_THRESHOLD_TOUCH = 12;
const TOUCH_DRAG_LIFT = 60;

// ---------- NAME ENTRY (rev15) ----------
function nameBoxRects(){
  const boxW=84, boxH=110, gap=18;
  const totalW = 3*boxW + 2*gap;
  const left = W/2 - totalW/2;
  const y = H/2 - 150;
  const rects = [];
  for(let i=0;i<3;i++) rects.push({x:left+i*(boxW+gap), y, w:boxW, h:boxH, index:i});
  return rects;
}
function startButtonRect(){
  const w=240, h=60;
  return {x:W/2-w/2, y:H/2+70, w, h};
}
function cycleLetter(ch, dir){
  const code = ((ch.charCodeAt(0)-65)+dir+26)%26;
  return String.fromCharCode(65+code);
}
function pointInRect(x,y,r){ return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
function handleNameEntryTap(x,y){
  const rects = nameBoxRects();
  for(const r of rects){
    if(pointInRect(x,y,r)){
      const upHalf = y < r.y + r.h/2;
      playerName[r.index] = cycleLetter(playerName[r.index], upHalf ? 1 : -1);
      sfxSelect();
      return;
    }
  }
  if(pointInRect(x,y,startButtonRect())){
    startGame();
  }
}

// rev15: small tappable control on the title screen that copies the local
// leaderboard as JSON, so it can be pasted into word-game-scores/scores.json
function copyScoresButtonRect(){
  const w=260, h=34;
  return {x:W/2-w/2, y:H-96, w, h};
}

function onPointerDown(clientX, clientY, isTouch){
  ensureAudio();
  if(state!=='playing') return; // title/nameentry/gameover are handled on pointer-up
  const {x,y} = canvasCoords(clientX, clientY);
  const slotIdx = traySlotAt(x,y);
  if(slotIdx!==null && tray[slotIdx]){
    pointerDown = { source:{type:'tray', index:slotIdx}, downX:x, downY:y, moved:false };
    sfxSelect();
    return;
  }
  const cell = gridCellAt(x,y);
  if(cell && grid[cell.row][cell.col]!==null){
    pointerDown = { source:{type:'grid', row:cell.row, col:cell.col}, downX:x, downY:y, moved:false };
    sfxSelect();
  }
}

function onPointerMove(clientX, clientY, isTouch){
  const {x,y} = canvasCoords(clientX, clientY);
  const liftY = isTouch ? y - TOUCH_DRAG_LIFT : y;
  hoverCell = gridCellAt(x, liftY);
  hoverTrash = trashAt(x, liftY);
  if(pointerDown){
    const dx=x-pointerDown.downX, dy=y-pointerDown.downY;
    const threshold = isTouch ? DRAG_THRESHOLD_TOUCH : DRAG_THRESHOLD_MOUSE;
    if(!pointerDown.moved && Math.hypot(dx,dy) > threshold){ pointerDown.moved = true; }
    if(pointerDown.moved){
      dragGhost = { source: pointerDown.source, x, y: liftY };
    }
  }
}

function onPointerUp(clientX, clientY, isTouch){
  if(state==='title'){
    const {x,y} = canvasCoords(clientX, clientY);
    if(pointInRect(x,y,copyScoresButtonRect())){
      copyLeaderboardToClipboard();
      return;
    }
    ensureAudio(); sfxSelect();
    state = 'nameentry';
    return;
  }
  if(state==='nameentry'){
    const {x,y} = canvasCoords(clientX, clientY);
    handleNameEntryTap(x,y);
    return;
  }
  if(state==='gameover'){
    // rev15: PLAY AGAIN button is the visible affordance, but tapping
    // anywhere on the game-over screen still restarts, same as before —
    // it reuses the name already set this session
    startGame();
    return;
  }
  if(state!=='playing'){ pointerDown=null; dragGhost=null; return; }

  const {x,y} = canvasCoords(clientX, clientY);
  const liftY = isTouch ? y - TOUCH_DRAG_LIFT : y;

  if(pointerDown){
    if(pointerDown.moved){
      if(trashAt(x,liftY)){
        trashLetterAt(pointerDown.source);
      } else {
        const cell = gridCellAt(x,liftY);
        if(cell) placeLetterAt(pointerDown.source, cell.row, cell.col);
        else sfxDeselect(); // dropped outside the grid — letter goes back
      }
    } else {
      const wasSelected = sameSource(selectedSource, pointerDown.source);
      selectedSource = wasSelected ? null : pointerDown.source;
      if(wasSelected) sfxDeselect();
    }
    pointerDown = null;
    dragGhost = null;
    return;
  }

  if(selectedSource){
    if(trashAt(x,y)){
      trashLetterAt(selectedSource);
    } else {
      const cell = gridCellAt(x,y);
      if(cell) placeLetterAt(selectedSource, cell.row, cell.col);
    }
  }
}

canvas.addEventListener('mousedown', (e)=> onPointerDown(e.clientX, e.clientY, false));
canvas.addEventListener('mousemove', (e)=> onPointerMove(e.clientX, e.clientY, false));
canvas.addEventListener('mouseleave', ()=>{ hoverCell = null; hoverTrash = false; });
canvas.addEventListener('mouseup', (e)=> onPointerUp(e.clientX, e.clientY, false));

canvas.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  if(t) onPointerDown(t.clientX, t.clientY, true);
}, {passive:false});
canvas.addEventListener('touchmove', (e)=>{
  e.preventDefault();
  const t = e.touches[0];
  if(t) onPointerMove(t.clientX, t.clientY, true);
}, {passive:false});
canvas.addEventListener('touchend', (e)=>{
  e.preventDefault();
  const t = e.changedTouches[0];
  if(t) onPointerUp(t.clientX, t.clientY, true);
  hoverCell = null; hoverTrash = false;
}, {passive:false});
canvas.addEventListener('touchcancel', (e)=>{
  e.preventDefault();
  pointerDown = null; dragGhost = null;
  hoverCell = null; hoverTrash = false;
}, {passive:false});

window.addEventListener('keydown', (e)=>{
  if(['Enter',' ','p','P','m','M'].indexOf(e.key)!==-1) e.preventDefault();
  ensureAudio();
  if(!e.repeat){
    if(e.key==='Enter'){
      if(state==='title') state='nameentry';
      else if(state==='nameentry') startGame();
      else if(state==='gameover') startGame();
      else if(state==='paused') state='playing';
    }
    if(e.key==='p' || e.key==='P'){
      if(state==='playing') state='paused';
      else if(state==='paused') state='playing';
    }
    if(e.key==='m' || e.key==='M'){ muted = !muted; }
  }
});

// ---------- PLACEMENT + WORD DETECTION ----------
function trashLetterAt(source){
  if(source.type==='tray'){
    // rev8: trashing a tray letter is a free instant re-roll — it always
    // gets replaced right away, unlimited, not drawn from the starter
    // budget. The scarcity is specifically for wasted placements and
    // missed timers, not for deliberately discarding a letter you don't want.
    if(!tray[source.index]) return;
    tray[source.index] = makeTraySlot();
    sfxTrash();
    selectedSource = null;
  } else {
    if(grid[source.row][source.col]===null) return;
    grid[source.row][source.col] = null;
    sfxTrash();
    selectedSource = null;
    // rev15: sacrificing a placed letter while the empty-tray grace
    // countdown is running is a genuine escape hatch — full timer reset
    // plus an immediate free tray letter. refillOneGapIfAllowed always
    // finds a gap here since grace only ever runs while the tray is
    // completely empty (traySize<=0, so every slot is null).
    if(graceTimeLeft !== null){
      graceTimeLeft = GRACE_SECONDS;
      refillOneGapIfAllowed(true);
    }
  }
}

function placeLetterAt(source, row, col){
  if(grid[row][col] !== null){ sfxInvalid(); return; }

  let ch;
  const fromTray = source.type==='tray';
  if(fromTray){
    if(!tray[source.index]) return;
    ch = tray[source.index].ch;
    // using a tray letter leaves that slot blank — refilled below only if
    // this placement completes a word, or (rev8) for free while the
    // starter budget still has letters left. Otherwise it stays empty
    // until some future word solve fills it.
    tray[source.index] = null;
    traySize--;
  } else {
    ch = grid[source.row][source.col];
    if(ch===null) return;
    grid[source.row][source.col] = null;
  }

  grid[row][col] = ch;
  placedAt[row][col] = elapsed;
  sfxPlace();
  selectedSource = null;

  const matched = runWordDetection(row,col);
  if(matched.length>0){
    matched.forEach(m=> { wordsFound.push(m.word); usedWords.add(m.word); });
    refillOneGapIfAllowed(true);
  } else if(fromTray){
    refillOneGapIfAllowed(false);
  }
  // an empty tray no longer ends the game immediately — see the grace
  // countdown in update()
}

function inBounds(r,c){ return r>=0 && r<GRID_SIZE && c>=0 && c<GRID_SIZE; }

function runWordDetection(row,col){
  // rev6: diagonals are back (rev5 had removed them), plus the original
  // horizontal/vertical axes — each of the 4 checked in both directions
  // below. Words must still be strictly adjacent with no gaps, length
  // MIN_WORD_LEN-MAX_WORD_LEN (rev15: 3-6, was 4-8).
  const axes = [[0,1],[1,0],[1,1],[1,-1]];
  const foundKeys = new Set();
  const matchedWords = [];
  const allMatchedCells = new Set();
  const alreadyUsedHits = new Set(); // real words found, but reused this game

  function checkSubstrings(str, cellsInOrder){
    const n = str.length;
    for(let len=MIN_WORD_LEN; len<=MAX_WORD_LEN && len<=n; len++){
      for(let start=0; start+len<=n; start++){
        const subCells = cellsInOrder.slice(start,start+len);
        const includesNew = subCells.some(([r,c])=>r===row && c===col);
        if(!includesNew) continue;
        const sub = str.substring(start,start+len);
        if(DICTIONARY.has(sub)){
          if(usedWords.has(sub)){
            alreadyUsedHits.add(sub);
            continue;
          }
          const key = subCells.map(rc=>rc.join(',')).sort().join('|');
          if(!foundKeys.has(key)){
            foundKeys.add(key);
            matchedWords.push({word:sub, cells:subCells});
            subCells.forEach(([r,c])=>allMatchedCells.add(r+','+c));
          }
        }
      }
    }
  }

  for(const [dr,dc] of axes){
    let sr=row, sc=col;
    while(inBounds(sr-dr,sc-dc) && grid[sr-dr][sc-dc]) { sr-=dr; sc-=dc; }
    const cells = [];
    let r=sr, c=sc;
    while(inBounds(r,c) && grid[r][c]){ cells.push([r,c]); r+=dr; c+=dc; }
    if(cells.length < MIN_WORD_LEN) continue;
    const runStr = cells.map(([r,c])=>grid[r][c]).join('');
    checkSubstrings(runStr, cells);
    checkSubstrings(runStr.split('').reverse().join(''), cells.slice().reverse());
  }

  if(matchedWords.length===0){
    if(alreadyUsedHits.size>0){
      const p = cellCenter(row,col);
      const word = [...alreadyUsedHits].sort((a,b)=>b.length-a.length)[0];
      addPopup(p.x, p.y-14, word+' ALREADY USED', 'rgba(255,255,255,0.55)');
    }
    return matchedWords;
  }

  let gained = 0;
  matchedWords.forEach(m=>{ gained += SCORE_FOR_LENGTH[m.word.length] || 0; });
  if(matchedWords.length>1) gained += (matchedWords.length-1)*50;
  score += gained;
  if(score>highScore) highScore = score;

  matchedWords.forEach(m=>{
    const cx = m.cells.reduce((s,[r,c])=>s+cellCenter(r,c).x,0)/m.cells.length;
    const cy = m.cells.reduce((s,[r,c])=>s+cellCenter(r,c).y,0)/m.cells.length;
    addPopup(cx, cy, m.word+' +'+(SCORE_FOR_LENGTH[m.word.length]||0), CLEAR_COLOR);
    m.cells.forEach(([r,c])=>{
      const p = cellCenter(r,c);
      burst(p.x,p.y,CLEAR_COLOR,10);
    });
    sfxWordFound(m.word.length);
  });

  allMatchedCells.forEach(key=>{
    const [r,c] = key.split(',').map(Number);
    clearingCells.push({row:r, col:c, startTime:elapsed});
    grid[r][c] = null;
  });

  return matchedWords;
}

function endGame(){
  state = 'gameover';
  if(score>highScore){ highScore=score; localStorage.setItem('wordGameHighScore', String(highScore)); }
  leaderboard = recordScore(playerName.join(''), score);
  sfxGameOver();
}

function missSlot(slotIndex){
  sfxMiss();
  // a missed timer leaves that fixed position blank — refilled for free
  // only if the rev8 starter budget still has letters left, otherwise
  // only solving a word brings it back. An empty tray no longer ends the
  // game immediately — see the grace countdown in update().
  tray[slotIndex] = null;
  traySize--;
  refillOneGapIfAllowed(false);
}

function firstBlankGap(){
  for(let i=0;i<TRAY_CAP;i++){
    if(tray[i]===null) return i;
  }
  return -1;
}

// Fills one blank tray slot, if any exist and it's actually allowed to.
// earnedByWord=true (a word was just solved) always succeeds when there's
// a gap — that's the permanent, unlimited way to refill. Otherwise this is
// the rev8 starter-budget top-up: only while free letters remain, and only
// up to STARTER_MAX_ACTIVE active at once.
function refillOneGapIfAllowed(earnedByWord){
  const gapIdx = firstBlankGap();
  if(gapIdx === -1) return false;
  if(earnedByWord){
    tray[gapIdx] = makeTraySlot();
    traySize++;
    sfxGrow();
    return true;
  }
  if(starterLettersRemaining > 0 && traySize < STARTER_MAX_ACTIVE){
    tray[gapIdx] = makeTraySlot();
    traySize++;
    starterLettersRemaining--;
    sfxGrow();
    return true;
  }
  return false;
}

// ---------- PARTICLES / POPUPS ----------
function cellCenter(row,col){
  return { x: GRID_LEFT + col*PITCH + CELL/2, y: GRID_TOP + row*PITCH + CELL/2 };
}
function burst(x,y,color,count){
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = 30+Math.random()*90;
    particles.push({ x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:0.4+Math.random()*0.35, maxLife:0.75, color });
  }
}
function addPopup(x,y,text,color){
  popups.push({x,y,text,color,life:1.0,maxLife:1.0});
}

// ---------- UPDATE ----------
function update(dt){
  if(state==='playing') elapsed += dt;

  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=150*dt; p.life-=dt; });
  particles = particles.filter(p=>p.life>0);
  popups.forEach(p=>{ p.y -= 22*dt; p.life -= dt; });
  popups = popups.filter(p=>p.life>0);
  clearingCells = clearingCells.filter(cc => elapsed - cc.startTime < 0.4);

  if(state!=='playing') return;

  if(isGridFull()){
    endGame();
    return;
  }

  // rev9: an empty tray starts (or continues) a 15s grace countdown rather
  // than ending the game outright — recovers (timer clears) the moment
  // traySize goes back above 0, however that happens.
  if(traySize <= 0){
    if(graceTimeLeft === null) graceTimeLeft = GRACE_SECONDS;
    graceTimeLeft -= dt;
    if(graceTimeLeft <= 0){
      endGame();
      return;
    }
  } else {
    graceTimeLeft = null;
  }

  // rev6: tray timers are a countdown (timeLeft) that ticks down each
  // frame, except while that slot is selected or being dragged — picking
  // a letter up pauses its clock until it's placed or put back down.
  // Positions are fixed now (missSlot replaces in place), so plain forward
  // iteration is safe.
  for(let i=0;i<tray.length;i++){
    const slot = tray[i];
    if(!slot) continue;
    const isPaused = (selectedSource && selectedSource.type==='tray' && selectedSource.index===i)
                   || (pointerDown && pointerDown.source.type==='tray' && pointerDown.source.index===i)
                   || (dragGhost && dragGhost.source.type==='tray' && dragGhost.source.index===i);
    if(isPaused) continue;
    slot.timeLeft -= dt;
    if(!slot.urgentPlayed && slot.timeLeft/slot.totalDuration < 0.3){
      slot.urgentPlayed = true;
      sfxUrgent();
    }
    if(slot.timeLeft <= 0){
      missSlot(i);
    }
  }
}

// ---------- RENDER ----------
function drawStarfield(t){
  stars.forEach(s=>{
    const a = 0.4 + Math.sin(t*0.001 + s.tw)*0.3;
    ctx.fillStyle = `rgba(180,200,255,${Math.max(0,a)})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawMatrixGrid(){
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,242,0.28)';
  ctx.lineWidth = 1;
  for(let i=0;i<=GRID_SIZE;i++){
    const x = GRID_LEFT + i*PITCH - GAP/2;
    const xc = clamp(x, GRID_LEFT, GRID_RIGHT);
    ctx.beginPath(); ctx.moveTo(xc, GRID_TOP); ctx.lineTo(xc, GRID_BOTTOM); ctx.stroke();
    const y = GRID_TOP + i*PITCH - GAP/2;
    const yc = clamp(y, GRID_TOP, GRID_BOTTOM);
    ctx.beginPath(); ctx.moveTo(GRID_LEFT, yc); ctx.lineTo(GRID_RIGHT, yc); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,255,242,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(GRID_LEFT-1, GRID_TOP-1, GRID_W+2, GRID_W+2);
  ctx.restore();
}

function drawGrid(){
  drawMatrixGrid();
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const x = GRID_LEFT + c*PITCH;
      const y = GRID_TOP + r*PITCH;
      let letter = grid[r][c];
      const isHover = hoverCell && hoverCell.row===r && hoverCell.col===c && !letter &&
                      (selectedSource!==null || dragGhost!==null);
      const clearing = clearingCells.find(cc=>cc.row===r && cc.col===c);
      const beingDragged = dragGhost && dragGhost.source.type==='grid' &&
                            dragGhost.source.row===r && dragGhost.source.col===c;
      const isSelected = selectedSource && selectedSource.type==='grid' &&
                          selectedSource.row===r && selectedSource.col===c;
      if(beingDragged) letter = null; // drawn as the ghost instead

      ctx.save();
      if(letter){
        const age = elapsed - placedAt[r][c];
        const scale = age<0.15 ? clamp(0.5 + (age/0.15)*0.5, 0.5, 1) : 1;
        const cx = x+CELL/2, cy = y+CELL/2;
        ctx.translate(cx,cy);
        ctx.scale(scale,scale);
        ctx.translate(-cx,-cy);

        ctx.fillStyle = clearing ? 'rgba(255,230,0,0.28)' : (isSelected ? 'rgba(255,230,0,0.22)' : TILE_COLORS.fill);
        ctx.strokeStyle = clearing || isSelected ? CLEAR_COLOR : TILE_COLORS.border;
        ctx.lineWidth = 2;
        ctx.shadowColor = clearing || isSelected ? CLEAR_COLOR : TILE_COLORS.border;
        ctx.shadowBlur = clearing || isSelected ? 16 : 6;
        roundRect(x+2,y+2,CELL-4,CELL-4,6);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = clearing ? '#fffbe0' : TILE_COLORS.text;
        ctx.font = 'bold 21px "Press Start 2P", monospace';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(letter, cx, cy+2);
      } else if(isHover){
        ctx.fillStyle = 'rgba(255,230,0,0.10)';
        ctx.strokeStyle = 'rgba(255,230,0,0.8)';
        ctx.lineWidth = 2;
        roundRect(x+2,y+2,CELL-4,CELL-4,6);
        ctx.fill(); ctx.stroke();
      }
      ctx.restore();
    }
  }
}

function drawTray(){
  const rects = traySlotRects();
  ctx.save();
  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.textAlign='center';
  ctx.fillText('LETTER TRAY — DRAG OR CLICK', W/2, TRAY_Y - TRAY_SLOT/2 - 12);

  rects.forEach(r=>{
    const slot = tray[r.index];
    const cx = r.x + r.w/2, cy = r.y + r.h/2;

    if(!slot){
      // inactive fixed position — dim empty placeholder, still occupying
      // its permanent spot so nothing else ever shifts to fill it
      ctx.save();
      ctx.translate(cx,cy);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.arc(0,0,r.w/2-6,0,Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
      return;
    }

    const beingDragged = dragGhost && dragGhost.source.type==='tray' && dragGhost.source.index===r.index;
    if(beingDragged) return; // drawn as ghost instead, below

    const selected = selectedSource && selectedSource.type==='tray' && selectedSource.index===r.index;
    // a selected slot's timer is paused (see update()) — always render it
    // yellow regardless of how close to expiring it was, so "frozen" reads
    // clearly rather than mixing in the red urgent styling
    const t = clamp(1 - slot.timeLeft/slot.totalDuration, 0, 1);
    const urgent = !selected && t > 0.7;

    ctx.save();
    ctx.translate(cx,cy);

    ctx.strokeStyle = selected ? '#ffe600' : (urgent ? 'rgba(255,43,78,0.9)' : 'rgba(0,255,242,0.7)');
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0,0,r.w/2, -Math.PI/2, -Math.PI/2 + (1-t)*Math.PI*2);
    ctx.stroke();

    ctx.fillStyle = selected ? 'rgba(255,230,0,0.25)' : 'rgba(0,10,20,0.6)';
    ctx.strokeStyle = selected ? '#ffe600' : (urgent ? '#ff2b4e' : '#00fff2');
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = selected ? 16 : 10;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0,0,r.w/2-6,0,Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#eafffe';
    ctx.font = 'bold 18px "Press Start 2P", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(slot.ch, 0, 2);

    const remaining = Math.max(0, slot.timeLeft);
    ctx.fillStyle = selected ? '#ffe600' : (urgent ? '#ff2b4e' : 'rgba(255,255,255,0.55)');
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillText(remaining.toFixed(1)+'s', 0, r.w/2 - 6 + 11);

    ctx.restore();
  });
  ctx.restore();
}

function drawTrashCan(){
  const active = dragGhost !== null; // a drag is in progress
  const hot = active && hoverTrash;

  ctx.save();
  ctx.translate(TRASH_X, TRASH_Y);

  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle = hot ? '#ff2b4e' : 'rgba(255,255,255,0.35)';
  ctx.textAlign='center';
  ctx.fillText('TRASH', 0, -TRASH_H/2 - 14);

  const glowColor = hot ? '#ff2b4e' : (active ? '#ffe600' : 'rgba(255,255,255,0.3)');
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 2;
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = hot ? 16 : (active ? 8 : 0);

  // lid + handle
  roundRect(-26, -TRASH_H/2, 52, 10, 3);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-8, -TRASH_H/2);
  ctx.lineTo(-8, -TRASH_H/2-8);
  ctx.lineTo(8, -TRASH_H/2-8);
  ctx.lineTo(8, -TRASH_H/2);
  ctx.stroke();

  // tapered body
  ctx.beginPath();
  ctx.moveTo(-22, -TRASH_H/2+12);
  ctx.lineTo(-18, TRASH_H/2);
  ctx.lineTo(18, TRASH_H/2);
  ctx.lineTo(22, -TRASH_H/2+12);
  ctx.closePath();
  ctx.stroke();

  // ridge lines
  ctx.beginPath();
  ctx.moveTo(-9, -TRASH_H/2+18); ctx.lineTo(-7, TRASH_H/2-8);
  ctx.moveTo(0, -TRASH_H/2+18); ctx.lineTo(0, TRASH_H/2-8);
  ctx.moveTo(9, -TRASH_H/2+18); ctx.lineTo(7, TRASH_H/2-8);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function dragGhostChar(){
  if(!dragGhost) return null;
  const s = dragGhost.source;
  if(s.type==='tray') return tray[s.index] ? tray[s.index].ch : null;
  return grid[s.row][s.col];
}

function drawDragGhost(){
  if(!dragGhost) return;
  const ch = dragGhostChar();
  if(!ch) return;
  ctx.save();
  ctx.translate(dragGhost.x, dragGhost.y);
  // rev14: a slightly bigger "lifted" scale reinforces that the letter has
  // been picked up off the board, separate from the touch lift-offset
  ctx.scale(1.12, 1.12);
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = 'rgba(255,230,0,0.25)';
  ctx.strokeStyle = '#ffe600';
  ctx.shadowColor = '#ffe600';
  ctx.shadowBlur = 20;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,TRAY_SLOT/2-4,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fffbe0';
  ctx.font = 'bold 19px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(ch, 0, 2);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// rev15: replaces the old single static line with a larger, continuously
// scrolling marquee — the loop string is drawn twice back-to-back so it
// wraps seamlessly, clipped to its lane so it never bleeds outside it.
function drawWordTicker(){
  ctx.save();
  ctx.strokeStyle='rgba(255,0,230,0.25)';
  ctx.beginPath(); ctx.moveTo(TICKER_LEFT, TICKER_LANE_TOP-4); ctx.lineTo(TICKER_RIGHT, TICKER_LANE_TOP-4); ctx.stroke();

  ctx.font = '8px "Press Start 2P", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('WORDS FOUND ('+wordsFound.length+')', W/2, TICKER_LABEL_Y);

  ctx.beginPath();
  ctx.rect(TICKER_LEFT, TICKER_LANE_TOP, TICKER_RIGHT-TICKER_LEFT, TICKER_LANE_H);
  ctx.clip();

  const cy = TICKER_LANE_TOP + TICKER_LANE_H/2;
  ctx.font = '15px "Press Start 2P", monospace';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff9be8';
  ctx.shadowColor = '#ff00e6';
  ctx.shadowBlur = 6;

  if(wordsFound.length===0){
    ctx.textAlign = 'center';
    ctx.fillText('NO WORDS YET', W/2, cy);
  } else {
    ctx.textAlign = 'left';
    const text = wordsFound.join('   •   ') + '   •   ';
    const textW = ctx.measureText(text).width;
    const offset = (elapsed*SCROLL_PX_PER_SEC) % textW;
    let x = TICKER_LEFT - offset;
    while(x < TICKER_RIGHT){
      ctx.fillText(text, x, cy);
      x += textW;
    }
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}
function drawPopups(){
  popups.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD(){
  ctx.save();
  ctx.font='14px "Press Start 2P", monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#00fff2';
  ctx.shadowColor='#00fff2'; ctx.shadowBlur=6;
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), 24, 22);
  ctx.shadowBlur=0;

  ctx.textAlign='center';
  ctx.fillStyle='#ffe600';
  ctx.shadowColor='#ffe600'; ctx.shadowBlur=6;
  ctx.fillText('HIGH '+String(highScore).padStart(6,'0'), W/2, 22);
  ctx.shadowBlur=0;

  ctx.textAlign='right';
  ctx.fillStyle='#ff2b4e';
  ctx.shadowColor='#ff2b4e'; ctx.shadowBlur=6;
  ctx.font='10px "Press Start 2P", monospace';
  ctx.fillText('LETTERS '+traySize, W-24, 24);
  ctx.shadowBlur=0;

  if(starterLettersRemaining > 0){
    ctx.font='7px "Press Start 2P", monospace';
    ctx.fillStyle='rgba(57,255,20,0.65)';
    ctx.fillText('STARTER SUPPLY '+starterLettersRemaining, W-24, 42);
  }

  ctx.strokeStyle='rgba(0,255,242,0.25)';
  ctx.beginPath(); ctx.moveTo(20,HUD_DIVIDER_Y); ctx.lineTo(W-20,HUD_DIVIDER_Y); ctx.stroke();
  ctx.restore();
}

function formatGraceTime(t){
  t = Math.max(0, t);
  const m = Math.floor(t/60);
  const s = t - m*60;
  return m>0 ? (m+':'+s.toFixed(1).padStart(4,'0')) : s.toFixed(1)+'s';
}

function drawGraceWarning(){
  if(graceTimeLeft === null) return;
  // rev14: bigger, more prominent banner over the (now-empty) tray area —
  // pulsing text plus an actual depleting progress bar, not just a number.
  // Rearranging grid letters into a word before this runs out is the only
  // way back.
  const pulse = 0.6 + 0.4*Math.sin(elapsed*6);
  const frac = clamp(graceTimeLeft/GRACE_SECONDS, 0, 1);

  ctx.save();
  const bannerW = 300, bannerH = 64;
  const bannerX = W/2 - bannerW/2, bannerY = TRAY_Y - bannerH/2;
  ctx.fillStyle = 'rgba(5,1,15,0.72)';
  ctx.strokeStyle = `rgba(255,43,78,${0.5+0.3*pulse})`;
  ctx.lineWidth = 2;
  roundRect(bannerX, bannerY, bannerW, bannerH, 8);
  ctx.fill(); ctx.stroke();

  ctx.font = 'bold 11px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(255,43,78,${pulse})`;
  ctx.shadowColor = '#ff2b4e';
  ctx.shadowBlur = 12;
  ctx.fillText('TRAY EMPTY — FORM A WORD!', W/2, TRAY_Y-16);
  ctx.font = 'bold 16px "Press Start 2P", monospace';
  ctx.fillText(formatGraceTime(graceTimeLeft), W/2, TRAY_Y+2);
  ctx.shadowBlur = 0;

  const barW = bannerW-40, barH = 10;
  const barX = W/2 - barW/2, barY = TRAY_Y + 18;
  ctx.strokeStyle = 'rgba(255,43,78,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = `rgba(255,43,78,${0.55+0.3*pulse})`;
  ctx.fillRect(barX, barY, barW*frac, barH);
  ctx.restore();
}

function centeredText(text, y, size, color, glow){
  ctx.font = size+'px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=color;
  if(glow){ ctx.shadowColor=color; ctx.shadowBlur=glow; }
  ctx.fillText(text, W/2, y);
  ctx.shadowBlur=0;
}

// rev15: ranked top-10 leaderboard, drawn on both the title and game-over
// screens from the same helper
function drawLeaderboard(topY){
  ctx.save();
  ctx.font='11px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#39ff14';
  ctx.shadowColor='#39ff14'; ctx.shadowBlur=6;
  ctx.fillText('TOP 10 SCORES', W/2, topY);
  ctx.shadowBlur=0;

  ctx.font='9px "Press Start 2P", monospace';
  if(leaderboard.length===0){
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillText('(no scores yet — be the first!)', W/2, topY+26);
  } else {
    const rowW = 260;
    leaderboard.slice(0,10).forEach((entry,i)=>{
      const y = topY + 26 + i*20;
      ctx.textAlign='left';
      ctx.fillStyle = i===0 ? '#ffe600' : 'rgba(234,255,254,0.85)';
      ctx.fillText((i+1)+'. '+entry.name, W/2-rowW/2, y);
      ctx.textAlign='right';
      ctx.fillText(String(entry.score).padStart(6,'0'), W/2+rowW/2, y);
    });
  }
  ctx.restore();
}

function drawToast(){
  if(!toastText || Date.now()>toastUntil) return;
  ctx.save();
  ctx.font='9px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#39ff14';
  ctx.shadowColor='#39ff14'; ctx.shadowBlur=8;
  ctx.fillText(toastText, W/2, H-20);
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawTitleScreen(t){
  drawStarfield(t);
  centeredText('WORD GAME', H/2-360, 34, '#00fff2', 18);
  const blink = Math.floor(Date.now()/500)%2===0;
  if(blink) centeredText('TAP TO START', H/2-292, 13, '#ffe600', 10);
  centeredText('A TRAY OF 8 LETTERS SITS AT THE TOP', H/2-250, 11, '#ff00e6', 6);
  centeredText('DRAG ONE DOWN, OR TAP IT THEN TAP A CELL', H/2-232, 9, '#8a7fc0', 0);
  centeredText('PLACED LETTERS CAN BE MOVED THE SAME WAY TOO', H/2-214, 9, '#8a7fc0', 0);
  centeredText('SELECTING A LETTER PAUSES ITS TIMER', H/2-196, 9, '#8a7fc0', 0);
  centeredText('DRAG A LETTER TO THE TRASH FOR A FREE INSTANT SWAP', H/2-178, 9, '#8a7fc0', 0);
  centeredText('SPELL 3-6 LETTER WORDS FROM ADJACENT LETTERS, NO GAPS', H/2-160, 9, '#8a7fc0', 0);
  centeredText('ACROSS, DOWN, OR DIAGONAL — EITHER DIRECTION COUNTS', H/2-142, 9, '#8a7fc0', 0);
  centeredText('EACH WORD CAN ONLY SCORE ONCE PER GAME', H/2-124, 9, '#8a7fc0', 0);
  centeredText('YOUR FIRST 100 LETTERS ARE FREE (UP TO 8 IN THE TRAY AT ONCE)', H/2-106, 9, '#8a7fc0', 0);
  centeredText('AFTER THAT, ONLY A SOLVED WORD REFILLS A TRAY SLOT', H/2-88, 9, '#8a7fc0', 0);
  centeredText('TRAY EMPTY? YOU GET 120s TO REARRANGE GRID LETTERS INTO A WORD', H/2-70, 9, '#8a7fc0', 0);
  centeredText('TRASHING A GRID LETTER DURING THAT COUNTDOWN RESETS IT', H/2-52, 9, '#8a7fc0', 0);
  centeredText('AND GIVES YOU A FRESH TRAY LETTER — A LAST-RESORT ESCAPE', H/2-34, 9, '#8a7fc0', 0);
  centeredText('GAME OVER IF THE GRID FILLS, OR TIME RUNS OUT ON AN EMPTY TRAY', H/2-16, 9, '#8a7fc0', 0);
  centeredText('HIGH SCORE '+String(highScore).padStart(6,'0'), H/2+14, 12, '#39ff14', 6);

  drawLeaderboard(H/2+56);

  const btn = copyScoresButtonRect();
  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,242,0.5)';
  ctx.lineWidth = 2;
  roundRect(btn.x, btn.y, btn.w, btn.h, 8);
  ctx.stroke();
  centeredText('[ COPY SCORES ]', btn.y+btn.h/2+1, 9, 'rgba(0,255,242,0.85)', 0);
  ctx.restore();
}

// rev15: player picks a 3-letter name before the first game of the
// session — tap the top half of a box to cycle the letter up, bottom
// half to cycle it down (wraps A-Z), then tap START GAME
function drawNameEntryScreen(t){
  drawStarfield(t);
  centeredText('ENTER YOUR NAME', H/2-220, 20, '#00fff2', 12);
  centeredText('TAP TOP/BOTTOM OF A LETTER TO CHANGE IT', H/2-180, 9, '#8a7fc0', 0);

  const rects = nameBoxRects();
  rects.forEach(r=>{
    const cx = r.x+r.w/2, cy = r.y+r.h/2;
    ctx.save();
    ctx.strokeStyle = '#00fff2';
    ctx.fillStyle = 'rgba(0,255,242,0.08)';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00fff2';
    ctx.shadowBlur = 8;
    roundRect(r.x, r.y, r.w, r.h, 10);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#eafffe';
    ctx.font = 'bold 40px "Press Start 2P", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(playerName[r.index], cx, cy+4);

    ctx.fillStyle = 'rgba(255,230,0,0.7)';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillText('▲', cx, r.y+14);
    ctx.fillText('▼', cx, r.y+r.h-10);
    ctx.restore();
  });

  const btn = startButtonRect();
  ctx.save();
  ctx.fillStyle = 'rgba(57,255,20,0.12)';
  ctx.strokeStyle = '#39ff14';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur = 10;
  roundRect(btn.x, btn.y, btn.w, btn.h, 10);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
  centeredText('START GAME', btn.y+btn.h/2+1, 12, '#39ff14', 6);
}

function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,H);
  centeredText('PAUSED', H/2, 26, '#ffe600', 14);
  centeredText('PRESS P TO RESUME', H/2+36, 10, '#00fff2', 6);
}

function drawGameOverScreen(t){
  drawStarfield(t);
  ctx.fillStyle='rgba(5,1,15,0.75)';
  ctx.fillRect(0,0,W,H);
  centeredText('GAME OVER', H/2-360, 30, '#ff2b4e', 16);
  centeredText(playerName.join('')+' — SCORE '+String(score).padStart(6,'0'), H/2-306, 14, '#00fff2', 8);
  centeredText('HIGH SCORE '+String(highScore).padStart(6,'0'), H/2-278, 11, '#ffe600', 6);

  const btnW=220, btnH=54;
  const btnX = W/2-btnW/2, btnY = H/2-240;
  ctx.save();
  ctx.fillStyle = 'rgba(57,255,20,0.12)';
  ctx.strokeStyle = '#39ff14';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#39ff14';
  ctx.shadowBlur = 10;
  roundRect(btnX, btnY, btnW, btnH, 10);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
  centeredText('PLAY AGAIN', btnY+btnH/2+1, 12, '#39ff14', 6);

  drawLeaderboard(H/2-150);

  const blink = Math.floor(Date.now()/500)%2===0;
  if(blink) centeredText('TAP ANYWHERE TO PLAY AGAIN', H/2+420, 9, 'rgba(255,255,255,0.5)', 0);
}

function render(t){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05010f';
  ctx.fillRect(0,0,W,H);

  if(state==='title'){
    drawTitleScreen(t);
    drawToast();
    return;
  }
  if(state==='nameentry'){
    drawNameEntryScreen(t);
    drawToast();
    return;
  }
  if(state==='gameover'){
    drawGameOverScreen(t);
    drawToast();
    return;
  }

  drawStarfield(t);
  drawHUD();
  drawTray();
  drawGrid();
  drawTrashCan();
  drawDragGhost();
  drawWordTicker();
  drawParticles();
  drawPopups();
  drawGraceWarning();

  if(state==='paused') drawPauseOverlay();
  drawToast();
}

// ---------- MAIN LOOP ----------
function loop(now){
  if(!lastTime) lastTime = now;
  let dt = (now-lastTime)/1000;
  if(dt>0.05) dt = 0.05;
  lastTime = now;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
