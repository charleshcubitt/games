<style>
:root{
  --neon-cyan:#00fff2;
  --neon-magenta:#ff00e6;
  --neon-yellow:#ffe600;
  --neon-green:#39ff14;
  --neon-red:#ff2b4e;
  --bg-deep:#05010f;
}
*{box-sizing:border-box;}
html,body{
  margin:0;padding:0;height:100%;
  background:radial-gradient(ellipse at center, #0d0221 0%, #05010f 60%, #000 100%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P','Courier New',monospace;
  color:var(--neon-cyan);
  overflow:hidden;
}
#arcadeCabinet{
  position:relative;
  padding:18px 18px 26px;
  border-radius:22px;
  background:linear-gradient(160deg,#1a0a2e,#0a0416 60%);
  box-shadow:
    0 0 0 2px #000,
    0 0 0 6px #2a1a44,
    0 0 40px 6px rgba(0,255,242,0.25),
    inset 0 0 30px rgba(255,0,230,0.08);
}
#titleBar{
  text-align:center;
  font-size:22px;
  letter-spacing:4px;
  color:var(--neon-cyan);
  text-shadow:0 0 6px var(--neon-cyan),0 0 18px var(--neon-cyan);
  margin-bottom:10px;
}
#screenWrap{
  position:relative;
  width:960px;max-width:92vw;
  border:3px solid #3a2a5a;
  border-radius:8px;
  background:#000;
  box-shadow:inset 0 0 60px rgba(0,255,242,0.06);
  overflow:hidden;
}
canvas{
  display:block;
  width:100%;
  height:auto;
  image-rendering:pixelated;
  background:#000;
  cursor:pointer;
}
#scanlines{
  position:absolute;inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.035) 0px,
    rgba(255,255,255,0.035) 1px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0) 3px
  );
  mix-blend-mode:overlay;
}
#vignette{
  position:absolute;inset:0;
  pointer-events:none;
  box-shadow:inset 0 0 140px 40px rgba(0,0,0,0.85);
}
#footerBar{
  margin-top:12px;
  text-align:center;
  font-size:9px;
  color:#7a6fa8;
  letter-spacing:1px;
  line-height:1.8;
}
#footerBar b{color:var(--neon-yellow);}
</style>
</head>

// ---------- CANVAS SETUP ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ---------- AUDIO ----------
let actx = null;
let muted = false;
function ensureAudio(){
  if(!actx){
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; }
  }
  if(actx && actx.state==='suspended'){ actx.resume(); }
}
function beep(freq, dur, type, vol, delay){
  if(muted || !actx) return;
  type = type||'square'; vol = vol===undefined?0.15:vol; delay = delay||0;
  const t = actx.currentTime + delay;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sfxPlace(){ beep(520,0.05,'square',0.10,0); }
function sfxInvalid(){ beep(160,0.08,'sawtooth',0.10,0); }
function sfxWordFound(len){
  const tones = [523,659,784,1046,1318];
  const n = Math.min(len-2, tones.length);
  for(let i=0;i<n;i++) beep(tones[i],0.10,'triangle',0.15,i*0.06);
}
function sfxMiss(){ beep(150,0.25,'sawtooth',0.18,0); }
function sfxGameOver(){ [420,340,260,160].forEach((f,i)=>beep(f,0.22,'sawtooth',0.18,i*0.16)); }
function sfxStart(){ beep(700,0.09,'square',0.14,0); beep(950,0.09,'square',0.14,0.09); }

// ---------- GRID / LAYOUT CONSTANTS ----------
const GRID_SIZE = 8;
const CELL = 44;
const GAP = 4;
const PITCH = CELL + GAP;
const GRID_W = GRID_SIZE*CELL + (GRID_SIZE-1)*GAP;
const GRID_LEFT = (W-GRID_W)/2;
const GRID_TOP = H - 24 - GRID_W;
const GRID_RIGHT = GRID_LEFT + GRID_W;
const GRID_BOTTOM = GRID_TOP + GRID_W;
const FALL_ZONE_TOP = 96;
const FALL_ZONE_BOTTOM = GRID_TOP - 14;
const HUD_DIVIDER_Y = 66;

const TILE_COLORS = { fill:'rgba(0,255,242,0.08)', border:'#00fff2', text:'#eafffe' };
const CLEAR_COLOR = '#ffe600';

// ---------- LETTER FREQUENCY BAG ----------
const LETTER_FREQ = {E:12,A:9,I:9,O:8,N:6,R:6,T:6,L:4,S:4,U:4,D:4,G:3,B:2,C:2,M:2,P:2,F:2,H:2,V:2,W:2,Y:2,K:1,J:1,X:1,Q:1,Z:1};
const LETTER_BAG = Object.entries(LETTER_FREQ).flatMap(([ch,n])=>Array(n).fill(ch));
function randomLetter(){ return LETTER_BAG[Math.floor(Math.random()*LETTER_BAG.length)]; }

const SCORE_FOR_LENGTH = {3:30,4:60,5:100,6:150,7:220,8:320};

function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

// ---------- STATE ----------
let state = 'title'; // title | playing | paused | gameover
let grid, placedAt; // grid[row][col] = letter or null; placedAt[row][col] = elapsed time of placement (for snap-in anim)
let fallingLetter = null; // {ch, startTime, duration}
let nextLetterCh = null;
let score = 0, lives = 5;
let highScore = parseInt(localStorage.getItem('wordGameHighScore')||'0',10) || 0;
let elapsed = 0;
let particles = [];
let popups = [];
let clearingCells = []; // {row,col,startTime}
let stars = [];
let lastTime = 0;
let hoverCell = null;

for(let i=0;i<70;i++){
  stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6+0.3, tw:Math.random()*Math.PI*2});
}

function makeGrid(){
  grid = Array.from({length:GRID_SIZE}, ()=>Array(GRID_SIZE).fill(null));
  placedAt = Array.from({length:GRID_SIZE}, ()=>Array(GRID_SIZE).fill(-999));
}

function isGridFull(){
  for(let r=0;r<GRID_SIZE;r++) for(let c=0;c<GRID_SIZE;c++) if(grid[r][c]===null) return false;
  return true;
}

function currentFallDuration(){
  return Math.max(3, 8 - elapsed*0.015);
}

// ---------- GAME RESET ----------
function startGame(){
  makeGrid();
  score = 0;
  lives = 5;
  elapsed = 0;
  particles = [];
  popups = [];
  clearingCells = [];
  fallingLetter = null;
  nextLetterCh = randomLetter();
  state = 'playing';
  ensureAudio();
  sfxStart();
  spawnFallingLetter();
}

function spawnFallingLetter(){
  if(isGridFull()){
    state = 'gameover';
    if(score>highScore){ highScore=score; localStorage.setItem('wordGameHighScore', String(highScore)); }
    sfxGameOver();
    return;
  }
  fallingLetter = { ch: nextLetterCh || randomLetter(), startTime: elapsed, duration: currentFallDuration() };
  nextLetterCh = randomLetter();
}

// ---------- INPUT ----------
function canvasCoords(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX-rect.left)*scaleX, y: (e.clientY-rect.top)*scaleY };
}
function gridCellAt(mx,my){
  if(mx<GRID_LEFT || mx>GRID_RIGHT || my<GRID_TOP || my>GRID_BOTTOM) return null;
  const col = Math.floor((mx-GRID_LEFT)/PITCH);
  const row = Math.floor((my-GRID_TOP)/PITCH);
  if(col<0||col>=GRID_SIZE||row<0||row>=GRID_SIZE) return null;
  return {row,col};
}

canvas.addEventListener('mousemove', (e)=>{
  const {x,y} = canvasCoords(e);
  hoverCell = gridCellAt(x,y);
});
canvas.addEventListener('mouseleave', ()=>{ hoverCell = null; });

canvas.addEventListener('click', (e)=>{
  ensureAudio();
  if(state==='title' || state==='gameover'){
    startGame();
    return;
  }
  if(state!=='playing' || !fallingLetter) return;
  const {x,y} = canvasCoords(e);
  const cell = gridCellAt(x,y);
  if(!cell){ return; }
  if(grid[cell.row][cell.col] !== null){ sfxInvalid(); return; }
  placeFallingLetter(cell.row, cell.col);
});

window.addEventListener('keydown', (e)=>{
  if(['Enter',' ','p','P','m','M'].indexOf(e.key)!==-1) e.preventDefault();
  ensureAudio();
  if(!e.repeat){
    if(e.key==='Enter'){
      if(state==='title' || state==='gameover') startGame();
      else if(state==='paused') state='playing';
    }
    if(e.key==='p' || e.key==='P'){
      if(state==='playing') state='paused';
      else if(state==='paused') state='playing';
    }
    if(e.key==='m' || e.key==='M'){ muted = !muted; }
  }
});

// ---------- PLACEMENT + WORD DETECTION ----------
function placeFallingLetter(row,col){
  grid[row][col] = fallingLetter.ch;
  placedAt[row][col] = elapsed;
  sfxPlace();
  fallingLetter = null;
  runWordDetection(row,col);
  spawnFallingLetter();
}

function inBounds(r,c){ return r>=0 && r<GRID_SIZE && c>=0 && c<GRID_SIZE; }

function runWordDetection(row,col){
  const axes = [[0,1],[1,0],[1,1],[1,-1]];
  const foundKeys = new Set();
  const matchedWords = []; // {word, cells:[[r,c],...]}
  const allMatchedCells = new Set();

  function checkSubstrings(str, cellsInOrder){
    const n = str.length;
    for(let len=3; len<=8 && len<=n; len++){
      for(let start=0; start+len<=n; start++){
        const subCells = cellsInOrder.slice(start,start+len);
        const includesNew = subCells.some(([r,c])=>r===row && c===col);
        if(!includesNew) continue;
        const sub = str.substring(start,start+len);
        if(DICTIONARY.has(sub)){
          const key = subCells.map(rc=>rc.join(',')).sort().join('|');
          if(!foundKeys.has(key)){
            foundKeys.add(key);
            matchedWords.push({word:sub, cells:subCells});
            subCells.forEach(([r,c])=>allMatchedCells.add(r+','+c));
          }
        }
      }
    }
  }

  for(const [dr,dc] of axes){
    let sr=row, sc=col;
    while(inBounds(sr-dr,sc-dc) && grid[sr-dr][sc-dc]) { sr-=dr; sc-=dc; }
    const cells = [];
    let r=sr, c=sc;
    while(inBounds(r,c) && grid[r][c]){ cells.push([r,c]); r+=dr; c+=dc; }
    if(cells.length < 3) continue;
    const runStr = cells.map(([r,c])=>grid[r][c]).join('');
    checkSubstrings(runStr, cells);
    checkSubstrings(runStr.split('').reverse().join(''), cells.slice().reverse());
  }

  if(matchedWords.length===0) return;

  let gained = 0;
  matchedWords.forEach((m,i)=>{
    gained += SCORE_FOR_LENGTH[m.word.length] || 0;
  });
  if(matchedWords.length>1) gained += (matchedWords.length-1)*50;
  score += gained;
  if(score>highScore) highScore = score;

  matchedWords.forEach(m=>{
    const cx = m.cells.reduce((s,[r,c])=>s+cellCenter(r,c).x,0)/m.cells.length;
    const cy = m.cells.reduce((s,[r,c])=>s+cellCenter(r,c).y,0)/m.cells.length;
    addPopup(cx, cy, m.word+' +'+(SCORE_FOR_LENGTH[m.word.length]||0), CLEAR_COLOR);
    m.cells.forEach(([r,c])=>{
      const p = cellCenter(r,c);
      burst(p.x,p.y,CLEAR_COLOR,10);
    });
    sfxWordFound(m.word.length);
  });

  allMatchedCells.forEach(key=>{
    const [r,c] = key.split(',').map(Number);
    clearingCells.push({row:r, col:c, startTime:elapsed});
    grid[r][c] = null;
  });
}

function missFallingLetter(){
  sfxMiss();
  fallingLetter = null;
  lives--;
  if(lives<=0){
    state = 'gameover';
    if(score>highScore){ highScore=score; localStorage.setItem('wordGameHighScore', String(highScore)); }
    sfxGameOver();
    return;
  }
  spawnFallingLetter();
}

// ---------- PARTICLES / POPUPS ----------
function cellCenter(row,col){
  return { x: GRID_LEFT + col*PITCH + CELL/2, y: GRID_TOP + row*PITCH + CELL/2 };
}
function burst(x,y,color,count){
  for(let i=0;i<count;i++){
    const ang = Math.random()*Math.PI*2;
    const spd = 30+Math.random()*90;
    particles.push({ x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd, life:0.4+Math.random()*0.35, maxLife:0.75, color });
  }
}
function addPopup(x,y,text,color){
  popups.push({x,y,text,color,life:1.0,maxLife:1.0});
}

// ---------- UPDATE ----------
function update(dt){
  if(state==='playing') elapsed += dt;

  particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=150*dt; p.life-=dt; });
  particles = particles.filter(p=>p.life>0);
  popups.forEach(p=>{ p.y -= 22*dt; p.life -= dt; });
  popups = popups.filter(p=>p.life>0);
  clearingCells = clearingCells.filter(cc => elapsed - cc.startTime < 0.4);

  if(state!=='playing') return;

  if(fallingLetter){
    const t = elapsed - fallingLetter.startTime;
    if(t >= fallingLetter.duration){
      missFallingLetter();
    }
  }
}

// ---------- RENDER ----------
function drawStarfield(t){
  stars.forEach(s=>{
    const a = 0.4 + Math.sin(t*0.001 + s.tw)*0.3;
    ctx.fillStyle = `rgba(180,200,255,${Math.max(0,a)})`;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  });
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function drawGrid(){
  for(let r=0;r<GRID_SIZE;r++){
    for(let c=0;c<GRID_SIZE;c++){
      const x = GRID_LEFT + c*PITCH;
      const y = GRID_TOP + r*PITCH;
      const letter = grid[r][c];
      const isHover = hoverCell && hoverCell.row===r && hoverCell.col===c && !letter && fallingLetter;
      const clearing = clearingCells.find(cc=>cc.row===r && cc.col===c);

      ctx.save();
      if(letter){
        const age = elapsed - placedAt[r][c];
        const scale = age<0.15 ? clamp(0.5 + (age/0.15)*0.5, 0.5, 1) : 1;
        const cx = x+CELL/2, cy = y+CELL/2;
        ctx.translate(cx,cy);
        ctx.scale(scale,scale);
        ctx.translate(-cx,-cy);

        ctx.fillStyle = clearing ? 'rgba(255,230,0,0.28)' : TILE_COLORS.fill;
        ctx.strokeStyle = clearing ? CLEAR_COLOR : TILE_COLORS.border;
        ctx.lineWidth = 2;
        ctx.shadowColor = clearing ? CLEAR_COLOR : TILE_COLORS.border;
        ctx.shadowBlur = clearing ? 16 : 6;
        roundRect(x,y,CELL,CELL,6);
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = clearing ? '#fffbe0' : TILE_COLORS.text;
        ctx.font = 'bold 22px "Press Start 2P", monospace';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(letter, cx, cy+2);
      } else {
        ctx.strokeStyle = isHover ? 'rgba(255,230,0,0.8)' : 'rgba(0,255,242,0.18)';
        ctx.lineWidth = isHover ? 2 : 1;
        ctx.setLineDash(isHover ? [] : [3,3]);
        roundRect(x,y,CELL,CELL,6);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }
  }
}

function drawFallingLetter(){
  if(!fallingLetter) return;
  const t = clamp((elapsed - fallingLetter.startTime)/fallingLetter.duration, 0, 1);
  const cx = (GRID_LEFT+GRID_RIGHT)/2;
  const cy = FALL_ZONE_TOP + t*(FALL_ZONE_BOTTOM-FALL_ZONE_TOP);
  const urgent = t > 0.7;

  ctx.save();
  ctx.translate(cx,cy);

  // countdown ring
  ctx.strokeStyle = urgent ? 'rgba(255,43,78,0.9)' : 'rgba(0,255,242,0.7)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0,0,20,-Math.PI/2,-Math.PI/2 + (1-t)*Math.PI*2);
  ctx.stroke();

  ctx.fillStyle = 'rgba(0,10,20,0.6)';
  ctx.strokeStyle = urgent ? '#ff2b4e' : '#00fff2';
  ctx.shadowColor = urgent ? '#ff2b4e' : '#00fff2';
  ctx.shadowBlur = 12;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,16,0,Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#eafffe';
  ctx.font = 'bold 18px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(fallingLetter.ch, 0, 2);
  ctx.restore();
}

function drawNextPreview(){
  const x = W-70, y = 100;
  ctx.save();
  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.textAlign='center';
  ctx.fillText('NEXT', x, y-24);
  ctx.strokeStyle='rgba(255,0,230,0.5)';
  ctx.lineWidth=2;
  roundRect(x-18,y-16,36,36,6);
  ctx.stroke();
  if(nextLetterCh){
    ctx.fillStyle='#ff9be8';
    ctx.font='bold 16px "Press Start 2P", monospace';
    ctx.textBaseline='middle';
    ctx.fillText(nextLetterCh, x, y+3);
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}
function drawPopups(){
  popups.forEach(p=>{
    ctx.globalAlpha = Math.max(0,p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign='center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD(){
  ctx.save();
  ctx.font='14px "Press Start 2P", monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#00fff2';
  ctx.shadowColor='#00fff2'; ctx.shadowBlur=6;
  ctx.fillText('SCORE '+String(score).padStart(6,'0'), 24, 22);
  ctx.shadowBlur=0;

  ctx.textAlign='center';
  ctx.fillStyle='#ffe600';
  ctx.shadowColor='#ffe600'; ctx.shadowBlur=6;
  ctx.fillText('HIGH '+String(highScore).padStart(6,'0'), W/2, 22);
  ctx.shadowBlur=0;

  ctx.textAlign='right';
  ctx.fillStyle='#ff2b4e';
  ctx.shadowColor='#ff2b4e'; ctx.shadowBlur=6;
  let hearts=''; for(let i=0;i<lives;i++) hearts+='♥ ';
  ctx.fillText(hearts.trim()||'--', W-24, 22);
  ctx.shadowBlur=0;

  ctx.strokeStyle='rgba(0,255,242,0.25)';
  ctx.beginPath(); ctx.moveTo(20,HUD_DIVIDER_Y); ctx.lineTo(W-20,HUD_DIVIDER_Y); ctx.stroke();
  ctx.restore();
}

function centeredText(text, y, size, color, glow){
  ctx.font = size+'px "Press Start 2P", monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=color;
  if(glow){ ctx.shadowColor=color; ctx.shadowBlur=glow; }
  ctx.fillText(text, W/2, y);
  ctx.shadowBlur=0;
}

function drawTitleScreen(t){
  drawStarfield(t);
  centeredText('WORD GAME', H/2-150, 34, '#00fff2', 18);
  const blink = Math.floor(Date.now()/500)%2===0;
  if(blink) centeredText('CLICK OR PRESS ENTER TO START', H/2-70, 13, '#ffe600', 10);
  centeredText('LETTERS FALL FROM ABOVE THE GRID', H/2-20, 11, '#ff00e6', 6);
  centeredText('CLICK ANY EMPTY CELL TO SNAP IT INTO PLACE', H/2+2, 9, '#8a7fc0', 0);
  centeredText('SPELL 3-8 LETTER WORDS ACROSS, DOWN, OR DIAGONAL', H/2+22, 9, '#8a7fc0', 0);
  centeredText('EITHER DIRECTION ALONG THE LINE COUNTS', H/2+40, 9, '#8a7fc0', 0);
  centeredText('MISS THE TIMER AND YOU LOSE A LIFE — FILL THE GRID AND IT\'S OVER', H/2+58, 9, '#8a7fc0', 0);
  centeredText('HIGH SCORE '+String(highScore).padStart(6,'0'), H/2+100, 12, '#39ff14', 6);
}

function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,W,H);
  centeredText('PAUSED', H/2, 26, '#ffe600', 14);
  centeredText('PRESS P TO RESUME', H/2+36, 10, '#00fff2', 6);
}

function drawGameOverScreen(t){
  drawStarfield(t);
  ctx.fillStyle='rgba(5,1,15,0.75)';
  ctx.fillRect(0,0,W,H);
  centeredText('GAME OVER', H/2-70, 30, '#ff2b4e', 16);
  centeredText('SCORE '+String(score).padStart(6,'0'), H/2-16, 16, '#00fff2', 8);
  centeredText('HIGH SCORE '+String(highScore).padStart(6,'0'), H/2+14, 12, '#ffe600', 6);
  const blink = Math.floor(Date.now()/500)%2===0;
  if(blink) centeredText('CLICK OR PRESS ENTER TO RETRY', H/2+70, 12, '#39ff14', 8);
}

function render(t){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#05010f';
  ctx.fillRect(0,0,W,H);

  if(state==='title'){
    drawTitleScreen(t);
    return;
  }
  if(state==='gameover'){
    drawGameOverScreen(t);
    return;
  }

  drawStarfield(t);
  drawHUD();
  drawNextPreview();
  drawFallingLetter();
  drawGrid();
  drawParticles();
  drawPopups();

  if(state==='paused') drawPauseOverlay();
}

// ---------- MAIN LOOP ----------
function loop(now){
  if(!lastTime) lastTime = now;
  let dt = (now-lastTime)/1000;
  if(dt>0.05) dt = 0.05;
  lastTime = now;
  update(dt);
  render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
