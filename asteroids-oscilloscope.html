<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASTEROIDS // OSCILLOSCOPE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Courier New', monospace;
  }
  #wrap {
    position:relative;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, #1a1a1a 0%, #000000 100%);
  }
  canvas {
    background:#000;
    box-shadow: 0 0 40px rgba(255,255,255,0.18), inset 0 0 80px rgba(255,255,255,0.06);
    border:2px solid #3a3a3a;
    image-rendering: pixelated;
  }
  /* CRT scanline overlay for extra green-phosphor authenticity */
  #wrap::after {
    content:'';
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:800px; height:600px;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode:multiply;
  }
  #hud {
    position:absolute;
    top:20px; left:0; right:0;
    display:flex; justify-content:space-between;
    padding:0 30px;
    color:#ffffff;
    text-shadow:0 0 8px #ffffff;
    font-size:20px;
    letter-spacing:2px;
    pointer-events:none;
    user-select:none;
  }
  #centerMsg {
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#ffffff;
    text-shadow:0 0 12px #ffffff, 0 0 24px #ffffff;
    pointer-events:none;
    user-select:none;
  }
  #centerMsg h1 {
    font-size:48px;
    letter-spacing:8px;
    margin-bottom:14px;
    animation: flicker 2.2s infinite;
  }
  #centerMsg p {
    font-size:16px;
    letter-spacing:2px;
    color:#cccccc;
    text-shadow:0 0 6px #ffffff;
  }
  #centerMsg .small {
    font-size:12px;
    color:#888888;
    margin-top:18px;
  }
  @keyframes flicker {
    0%, 19%, 21%, 23%, 54%, 56%, 100% { opacity:1; }
    20%, 22%, 55% { opacity:0.6; }
  }
  #touchControls {
    position:absolute;
    bottom:20px; left:0; right:0;
    display:none;
    justify-content:space-between;
    padding:0 20px;
    pointer-events:none;
  }
  .tbtn {
    pointer-events:all;
    width:64px; height:64px;
    border-radius:50%;
    border:2px solid #ffffff;
    background:rgba(255,255,255,0.08);
    color:#ffffff;
    font-size:22px;
    display:flex; align-items:center; justify-content:center;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  .tgroup { display:flex; gap:14px; }
  @media (max-width: 900px), (pointer:coarse) {
    #touchControls { display:flex; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="600"></canvas>
  <div id="hud">
    <div id="score">SCORE: 0</div>
    <div id="lives">LIVES: 3</div>
    <div id="level">WAVE: 1</div>
  </div>
  <div id="centerMsg">
    <h1>ASTEROIDS</h1>
    <p>Z / C ROTATE &nbsp; A / S / D THRUST &nbsp; SPACE FIRE</p>
    <p class="small">PRESS ENTER OR TAP TO START</p>
  </div>
  <div id="touchControls">
    <div class="tgroup">
      <div class="tbtn" id="btnLeft">&#8630;</div>
      <div class="tbtn" id="btnRight">&#8631;</div>
    </div>
    <div class="tgroup">
      <div class="tbtn" id="btnThrust">&#9650;</div>
      <div class="tbtn" id="btnFire">&#9679;</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const centerMsg = document.getElementById('centerMsg');

// ---------- Utility ----------
function rand(min, max) { return Math.random() * (max - min) + min; }
function wrap(obj) {
  if (obj.x < -obj.r) obj.x = W + obj.r;
  if (obj.x > W + obj.r) obj.x = -obj.r;
  if (obj.y < -obj.r) obj.y = H + obj.r;
  if (obj.y > H + obj.r) obj.y = -obj.r;
}
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

// ---------- Sound (simple WebAudio blips) ----------
let audioCtx;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}
function beep(freq, dur, type='square', vol=0.05, delay=0) {
  if (!audioCtx) return;
  const startAt = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(startAt);
  g.gain.exponentialRampToValueAtTime(0.0001, startAt + dur);
  o.stop(startAt + dur);
}
function sfxFire() { beep(880, 0.08, 'square', 0.04); }
function sfxThrust() { beep(120, 0.05, 'sawtooth', 0.02); }
function sfxExplodeBig() { beep(80, 0.35, 'sawtooth', 0.08); }
function sfxExplodeSmall() { beep(200, 0.2, 'sawtooth', 0.06); }
function sfxShipDie() { beep(60, 0.6, 'sawtooth', 0.1); }
function sfxExtraLife() { beep(1200, 0.15, 'sine', 0.05); }
function sfxStart() {
  beep(220, 0.08, 'square', 0.05, 0);
  beep(440, 0.08, 'square', 0.05, 0.08);
  beep(660, 0.12, 'square', 0.05, 0.16);
}
function sfxLevelUp() {
  beep(440, 0.1, 'square', 0.05, 0);
  beep(660, 0.1, 'square', 0.05, 0.09);
  beep(880, 0.15, 'square', 0.05, 0.18);
}

// ---------- Game State ----------
let ship, bullets = [], asteroids = [], particles = [], keys;
let score = 0, lives = 3, level = 1;
let state = 'menu'; // menu, playing, gameover
let nextLifeScore = 10000;
let invulnTimer = 0;

function makeShip() {
  return {
    x: W/2, y: H/2,
    r: 14,
    angle: -Math.PI/2,
    rot: 0,
    thrusting: false,
    vx: 0, vy: 0,
    canFire: true,
  };
}

function newAsteroid(x, y, size) {
  // size: 3 = large, 2 = medium, 1 = small
  const speedBase = 4 - size; // bigger = slower
  const angle = rand(0, Math.PI*2);
  const speed = rand(0.4, 1.2) + speedBase*0.3;
  const radius = size === 3 ? 46 : size === 2 ? 26 : 14;
  const vertCount = Math.floor(rand(8, 13));
  const offsets = [];
  for (let i=0; i<vertCount; i++) {
    offsets.push(rand(0.75, 1.25));
  }
  return {
    x, y,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    r: radius,
    size,
    angle: rand(0, Math.PI*2),
    spin: rand(-0.02, 0.02),
    offsets
  };
}

function spawnWave(n) {
  asteroids = [];
  for (let i=0; i<n; i++) {
    let x, y;
    do {
      x = rand(0, W); y = rand(0, H);
    } while (dist({x,y}, ship) < 150);
    asteroids.push(newAsteroid(x, y, 3));
  }
}

function resetGame() {
  ship = makeShip();
  bullets = [];
  particles = [];
  score = 0;
  lives = 3;
  level = 1;
  nextLifeScore = 10000;
  invulnTimer = 120;
  spawnWave(4);
  updateHud();
}

function updateHud() {
  scoreEl.textContent = 'SCORE: ' + score;
  livesEl.textContent = 'LIVES: ' + lives;
  levelEl.textContent = 'WAVE: ' + level;
}

// ---------- Input ----------
// Rotate: Z (left) / C (right)   Thrust: A, S, or D   Fire: Space
// Arrow keys are also kept as a quiet fallback.
keys = { left:false, right:false, up:false, fire:false };

const PREVENT_CODES = ['ArrowLeft','ArrowRight','ArrowUp','Space','Enter'];

window.addEventListener('keydown', (e) => {
  if (PREVENT_CODES.includes(e.code)) e.preventDefault();
  if (e.code === 'ArrowLeft' || e.code === 'KeyZ') keys.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyC') keys.right = true;
  if (e.code === 'ArrowUp' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD') keys.up = true;
  if (e.code === 'Space') { keys.fire = true; fireBullet(); }
  if (e.code === 'Enter') startGame();
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyZ') keys.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyC') keys.right = false;
  if (e.code === 'ArrowUp' || e.code === 'KeyA' || e.code === 'KeyS' || e.code === 'KeyD') keys.up = false;
  if (e.code === 'Space') keys.fire = false;
});

canvas.addEventListener('click', startGame);
centerMsg.addEventListener('click', startGame);

// Touch controls
function bindHold(el, onDown, onUp) {
  el.addEventListener('touchstart', (e) => { e.preventDefault(); onDown(); }, {passive:false});
  el.addEventListener('touchend', (e) => { e.preventDefault(); onUp(); }, {passive:false});
  el.addEventListener('mousedown', (e) => { onDown(); });
  el.addEventListener('mouseup', (e) => { onUp(); });
  el.addEventListener('mouseleave', (e) => { onUp(); });
}
bindHold(document.getElementById('btnLeft'), () => keys.left=true, () => keys.left=false);
bindHold(document.getElementById('btnRight'), () => keys.right=true, () => keys.right=false);
bindHold(document.getElementById('btnThrust'), () => keys.up=true, () => keys.up=false);
bindHold(document.getElementById('btnFire'), () => { fireBullet(); }, () => {});

function startGame() {
  ensureAudio();
  if (state !== 'playing') {
    resetGame();
    state = 'playing';
    centerMsg.style.display = 'none';
    sfxStart();
  }
}

// ---------- Game Logic ----------
function fireBullet() {
  if (state !== 'playing') return;
  if (bullets.length >= 5) return;
  ensureAudio();
  const speed = 7;
  bullets.push({
    x: ship.x + Math.cos(ship.angle)*ship.r,
    y: ship.y + Math.sin(ship.angle)*ship.r,
    vx: Math.cos(ship.angle)*speed + ship.vx,
    vy: Math.sin(ship.angle)*speed + ship.vy,
    r: 2,
    life: 60
  });
  sfxFire();
}

function spawnParticles(x, y, count, color, speedMax=3) {
  for (let i=0; i<count; i++) {
    const angle = rand(0, Math.PI*2);
    const speed = rand(0.5, speedMax);
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: rand(20, 50),
      maxLife: 50,
      color
    });
  }
}

function breakAsteroid(a, index) {
  const bigCount = a.size === 3 ? 20 : a.size === 2 ? 12 : 8;
  spawnParticles(a.x, a.y, bigCount, '#ffffff', a.size);
  if (a.size === 3) { sfxExplodeBig(); score += 20; }
  else if (a.size === 2) { sfxExplodeSmall(); score += 50; }
  else { sfxExplodeSmall(); score += 100; }

  if (a.size > 1) {
    for (let i=0; i<2; i++) {
      asteroids.push(newAsteroid(a.x, a.y, a.size - 1));
    }
  }
  asteroids.splice(index, 1);

  if (score >= nextLifeScore) {
    lives++;
    nextLifeScore += 10000;
    sfxExtraLife();
  }
  updateHud();

  if (asteroids.length === 0) {
    level++;
    invulnTimer = 90;
    spawnWave(3 + level);
    sfxLevelUp();
    updateHud();
  }
}

function shipHit() {
  if (invulnTimer > 0) return;
  sfxShipDie();
  spawnParticles(ship.x, ship.y, 30, '#ffffff', 4);
  lives--;
  updateHud();
  if (lives <= 0) {
    state = 'gameover';
    showGameOver();
  } else {
    ship = makeShip();
    invulnTimer = 120;
  }
}

function showGameOver() {
  centerMsg.innerHTML =
    '<h1>GAME OVER</h1>' +
    '<p>FINAL SCORE: ' + score + '</p>' +
    '<p class="small">PRESS ENTER OR TAP TO RESTART</p>';
  centerMsg.style.display = 'block';
}

// ---------- Update ----------
function update() {
  if (state !== 'playing') return;

  // ship rotation
  if (keys.left) ship.angle -= 0.06;
  if (keys.right) ship.angle += 0.06;

  // thrust
  ship.thrusting = keys.up;
  if (keys.up) {
    ship.vx += Math.cos(ship.angle) * 0.12;
    ship.vy += Math.sin(ship.angle) * 0.12;
    if (Math.random() < 0.6) sfxThrust();
    // thrust particles
    particles.push({
      x: ship.x - Math.cos(ship.angle)*ship.r,
      y: ship.y - Math.sin(ship.angle)*ship.r,
      vx: -Math.cos(ship.angle)*rand(1,2) + rand(-0.5,0.5),
      vy: -Math.sin(ship.angle)*rand(1,2) + rand(-0.5,0.5),
      life: rand(10,20),
      maxLife: 20,
      color:'#dddddd'
    });
  }

  // friction/drag
  ship.vx *= 0.99;
  ship.vy *= 0.99;
  ship.x += ship.vx;
  ship.y += ship.vy;
  wrap(ship);

  if (invulnTimer > 0) invulnTimer--;

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    wrap(b);
    b.life--;
    if (b.life <= 0) bullets.splice(i, 1);
  }

  // asteroids
  for (const a of asteroids) {
    a.x += a.vx; a.y += a.vy;
    a.angle += a.spin;
    wrap(a);
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.98; p.vy *= 0.98;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // collisions: bullets vs asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (dist(a, b) < a.r) {
        bullets.splice(j, 1);
        breakAsteroid(a, i);
        break;
      }
    }
  }

  // collisions: ship vs asteroids
  if (invulnTimer <= 0) {
    for (const a of asteroids) {
      if (dist(a, ship) < a.r + ship.r*0.6) {
        shipHit();
        break;
      }
    }
  }
}

// ---------- Draw ----------
function drawShip() {
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(ship.angle);

  const blink = invulnTimer > 0 && Math.floor(invulnTimer/6) % 2 === 0;
  ctx.strokeStyle = blink ? 'rgba(255,255,255,0.3)' : '#ffffff';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 10;

  ctx.beginPath();
  ctx.moveTo(ship.r, 0);
  ctx.lineTo(-ship.r*0.8, ship.r*0.7);
  ctx.lineTo(-ship.r*0.4, 0);
  ctx.lineTo(-ship.r*0.8, -ship.r*0.7);
  ctx.closePath();
  ctx.stroke();

  if (ship.thrusting) {
    ctx.strokeStyle = '#dddddd';
    ctx.shadowColor = '#dddddd';
    ctx.beginPath();
    ctx.moveTo(-ship.r*0.4, 0);
    ctx.lineTo(-ship.r*1.3 - rand(0,6), 0);
    ctx.stroke();
  }

  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);
  ctx.strokeStyle = '#bbbbbb';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#777777';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  const n = a.offsets.length;
  for (let i=0; i<n; i++) {
    const ang = (i / n) * Math.PI * 2;
    const rr = a.r * a.offsets[i];
    const x = Math.cos(ang) * rr;
    const y = Math.sin(ang) * rr;
    if (i === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 1.6, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// starfield background (static twinkling dots)
const stars = [];
for (let i=0; i<90; i++) {
  stars.push({x: rand(0,W), y: rand(0,H), r: rand(0.5,1.6), phase: rand(0, Math.PI*2)});
}
function drawStars(t) {
  ctx.save();
  for (const s of stars) {
    const alpha = 0.2 + 0.4*Math.abs(Math.sin(t*0.001 + s.phase));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#555555';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);
  drawStars(t);

  if (state === 'playing') {
    drawShip();
    for (const b of bullets) drawBullet(b);
    for (const a of asteroids) drawAsteroid(a);
  }
  for (const p of particles) drawParticle(p);
}

// ---------- Loop ----------
function loop(t) {
  try {
    update();
    draw(t);
  } catch (err) {
    console.error('Game loop error:', err);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
