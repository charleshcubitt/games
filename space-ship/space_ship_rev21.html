<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- rev14: mobile port -- locks pinch-zoom/scaling so touch controls don't
     fight the browser's own gesture handling -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<!-- rev21: iOS Safari has never implemented the Fullscreen API for
     ordinary tapped-into-from-a-link pages (element.requestFullscreen()
     is silently ignored there) -- the only way to get a truly chrome-
     less experience on iOS is "Add to Home Screen", which launches the
     page standalone with zero browser UI. These tags make that mode
     work once installed; they don't do anything on a normal Safari tab. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Space Ship">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Space%20Ship%22,%22short_name%22:%22Space%20Ship%22,%22display%22:%22fullscreen%22,%22start_url%22:%22.%22,%22background_color%22:%22%23000000%22,%22theme_color%22:%22%23000000%22}">
<title>SPACE SHIP // VECTOR FLIGHT</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    font-family:'Courier New', monospace;
  }
  #wrap {
    /* rev21: position:fixed + JS-assigned pixel width/height (see
       resizeCanvas()) instead of 100vw/100vh -- on mobile, vh/vw resolve
       against the "layout viewport" (full page height, address bar
       excluded from the calculation entirely on many browsers), NOT the
       actually-visible area, so the box was always taller than what's
       really on screen and the canvas inside it got pushed down behind
       the bar. Fixed positioning + exact pixel sizing from
       window.visualViewport removes that dependency completely. */
    position:fixed;
    top:0; left:0;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at center, #0c0c0c 0%, #000000 100%);
  }
  canvas {
    background:#000;
    cursor:crosshair;
    /* rev21: phone-only -- the canvas IS the viewport now (resized in
       JS to window.visualViewport's actual visible size on load/resize),
       so it always fills the screen exactly instead of "contain"-fitting
       a fixed aspect ratio that only approximately matched real phones.
       Width/height are set directly in JS (canvas.style.width/height, in
       real pixels) rather than via 100vw/100vh here -- those units don't
       reliably track the visible area net of the address bar on mobile. */
    display:block;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
  }
  /* CRT scanline overlay -- same technique as the other arcade games in
     this repo, just left color-neutral since everything here is white */
  #wrap::after {
    content:'';
    position:absolute;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode:multiply;
  }
  #centerMsg {
    position:absolute;
    top:34%; left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:#fff;
    text-shadow:0 0 12px #fff, 0 0 24px rgba(255,255,255,0.6);
    pointer-events:none;
    user-select:none;
    /* rev4: the wider canopy dividers can cross right through this text at
       some scroll positions -- a translucent backdrop keeps it legible
       against whatever's on the canvas behind it */
    background:rgba(0,0,0,0.6);
    padding:20px 26px;
    border-radius:10px;
    /* rev15: portrait canvas is much narrower -- cap the overlay's width
       so it wraps predictably instead of stretching (and wrapping messily)
       to whatever the actual viewport happens to be */
    max-width:340px;
  }
  #centerMsg h1 {
    font-size:36px;
    letter-spacing:8px;
    margin-bottom:10px;
    animation: flicker 2.2s infinite;
  }
  #centerMsg p {
    font-size:12.5px;
    letter-spacing:1px;
    color:#cfcfcf;
    text-shadow:0 0 6px rgba(255,255,255,0.7);
    margin-top:5px;
  }
  #centerMsg .small {
    font-size:12px;
    color:#888;
    margin-top:18px;
  }
  #centerMsg .heading {
    font-size:24px;
    letter-spacing:5px;
    margin-top:20px;
    margin-bottom:8px;
  }
  #centerMsg .digits {
    display:flex;
    justify-content:center;
    gap:14px;
    margin:20px 0;
  }
  #centerMsg .digitBox {
    width:54px; height:70px;
    border:2px solid rgba(255,255,255,0.45);
    border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:bold;
  }
  #centerMsg .digitBox.active {
    border-color:#fff;
    box-shadow:0 0 14px rgba(255,255,255,0.7);
  }
  #centerMsg .btn {
    display:inline-block;
    margin-top:16px;
    padding:10px 26px;
    border:2px solid rgba(255,255,255,0.6);
    border-radius:6px;
    font-size:13px;
    letter-spacing:3px;
    box-shadow:0 0 10px rgba(255,255,255,0.15);
    /* rev14: #centerMsg itself is pointer-events:none (clicks fall through
       to the canvas below by design), but .btn (e.g. "NEW GAME") needs to
       be a real, independently-clickable target -- re-enable just for it */
    pointer-events:auto;
    cursor:pointer;
  }
  #centerMsg .lb {
    display:inline-block;
    text-align:left;
    min-width:260px;
    margin-top:4px;
  }
  #centerMsg .lbrow {
    display:flex;
    justify-content:space-between;
    font-size:11px;
    padding:2px 0;
    color:#ccc;
  }
  #centerMsg .lbrow.top { color:#fff; text-shadow:0 0 6px rgba(255,255,255,0.8); }
  @keyframes flicker {
    0%, 19%, 21%, 23%, 54%, 56%, 100% { opacity:1; }
    20%, 22%, 55% { opacity:0.6; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="390" height="844"></canvas>
  <div id="centerMsg"></div>
</div>

<script>
(function(){
"use strict";

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const centerMsg = document.getElementById('centerMsg');
const wrap = document.getElementById('wrap');

// ---------- LAYOUT ----------
// rev21: phone-only -- the canvas is resized to the actual device
// viewport (rather than a fixed internal resolution "contain"-scaled via
// CSS), so it always fills the screen edge-to-edge no matter the specific
// phone's aspect ratio. Every layout constant here is `let` and gets
// recomputed by resizeCanvas() on load, window resize, and orientation
// change. Viewing screen = top two-thirds; console = bottom third.
let W, H, VIEW_H, CONSOLE_Y, CONSOLE_H, CENTER_X, CENTER_Y;
// rev21: must exist before resizeCanvas()'s initial call below, which
// populates it via regenerateStars() (defined later, but that's fine --
// function declarations hoist; `let stars` itself does not, so it has to
// be declared up here, ahead of that call).
let stars = [];
// rev21: window.innerWidth/innerHeight don't reliably shrink when a
// mobile browser's address bar is showing as an overlay (rather than
// affecting page layout) -- the page keeps thinking it has the full
// height, so content ends up drawn behind where the bar actually sits.
// window.visualViewport reports the ACTUAL visible area, excluding any
// on-screen browser chrome, and fires its own 'resize' as that chrome
// shows/hides -- this is the correct API for "don't draw under the
// address bar", not innerWidth/innerHeight.
function getViewportSize(){
  if(window.visualViewport){
    return { w: window.visualViewport.width, h: window.visualViewport.height };
  }
  return { w: window.innerWidth, h: window.innerHeight };
}
function resizeCanvas(){
  const vp = getViewportSize();
  W = Math.round(vp.w);
  H = Math.round(vp.h);
  canvas.width = W; canvas.height = H;
  // rev21: pin the CSS box to the exact same pixel dimensions as the
  // drawing buffer -- 100vw/100vh (previously used here) don't reliably
  // resolve to the actually-visible area on mobile, so the canvas's
  // on-screen size could end up taller than what resizeCanvas() thought
  // it was sizing for, pushing the console down behind the address bar.
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  wrap.style.width = W + 'px';
  wrap.style.height = H + 'px';
  VIEW_H = Math.round(H * (2/3));
  CONSOLE_Y = VIEW_H;
  CONSOLE_H = H - VIEW_H;
  CENTER_X = W/2;
  // rev2: the vanishing point (where asteroids and bullets both converge
  // at infinite distance) sits 60% up from the bottom of the forward
  // viewport, not dead-center -- per request.
  CENTER_Y = VIEW_H * 0.4;
  regenerateStars();
}
// rev21: run immediately so every later top-level initializer that reads
// W/H/CENTER_X/CENTER_Y (e.g. the initial mouseX/mouseY) gets real values,
// not undefined -- the listeners below keep it in sync from here on.
// visualViewport's own 'resize' fires live as the address bar shows/hides
// (not just on an actual window resize/rotation), which is exactly the
// case this is meant to catch.
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', resizeCanvas);
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', resizeCanvas);
}

// rev21: the whole console is now computed fresh every frame as
// fractions of the current W/CONSOLE_H (see computeLayout()), instead of
// fixed-pixel BTN_* constants -- necessary now that the canvas itself is
// resizable. `layout` is refreshed at the top of drawConsole() and read
// by the pointer-input handler for hit-testing, so drawing and hit-
// testing always agree on where things are.
let layout = null;
function hitButton(px, py, btn){
  const localY = py - CONSOLE_Y;
  if(btn.shape==='circle'){
    return Math.hypot(px-btn.cx, localY-btn.cy) <= btn.r;
  }
  return px >= btn.x && px <= btn.x+btn.w && localY >= btn.y && localY <= btn.y+btn.h;
}

// ---------- PROJECTION / FLIGHT TUNING ----------
// rev16: scaled down from 500 to match the portrait canvas's narrower
// width (was tuned for W=1000; kept at 500 through rev15's W=700 canvas,
// which effectively narrowed the field of view -- rocks and tracers all
// converged into a tight central tunnel instead of spreading across the
// screen like before). 500 * (700/1000) = 350 restores the original FOV.
const FOV_SCALE = 350;
const STEER_SPEED = 380;     // rev8: 2x more sensitive again (was 190) -- world units/sec while a direction is held
const STEER_LAG_RATE = 4.5;  // rev5: how fast the ship's actual heading eases toward the aim direction -- lower = more lag
// rev3: 2x rev2's already-4x'd speed. Min/max scaled with the default to
// keep the same relative slow/fast range.
const SPEED_DEFAULT = 144, SPEED_MIN = 64, SPEED_MAX = 336;
const SPEED_ACCEL = 220;     // units/sec^2 while M/B held -- rev3: speed now PERSISTS after release, no decay back to default
const MAX_ROLL_DEG = 7;      // cosmetic banking tilt at full steering deflection
// rev8: replaces the old endless-conveyor spawn constants -- the field is
// a static, finite volume topped up ahead of the ship (see generateField)
const FIELD_SPAN = 150;      // lateral extent rocks/clusters are placed across
const FIELD_Z_MIN = 60, FIELD_Z_MAX = 900; // depth range of the field volume
const CLUSTER_COUNT_MIN = 2, CLUSTER_COUNT_MAX = 3; // density clusters
const CLUSTER_ROCK_MIN = 10, CLUSTER_ROCK_MAX = 18; // rocks per cluster, scaled by its weight
const AMBIENT_ROCK_COUNT = 14; // thin scatter across the whole volume so it isn't empty between clusters
const DEFLECT_CHANCE = 0.8;  // rev7: chance a hit fragment gets flung clear on a radical tangent (was 0.7)
const DEFLECT_KICK_MIN = 30, DEFLECT_KICK_MAX = 46; // rev6: sideways speed for a deflected fragment
const COLLIDE_Z = 8;         // z at which an unshot rock is checked for a player hit
const CULL_Z = -30;          // z at which a passed rock is recycled
const PLAYER_HIT_RADIUS = 11;
// rev21: no more heat/overheat system and no more ramp-up -- holding FIRE
// fires continuously at this one fixed fast rate from the first frame,
// per request ("fully continuous... lose the cannon recharge indicator").
const FIRE_COOLDOWN = 0.06;
const ENGAGE_Z_MIN = 4, ENGAGE_Z_MAX = 650; // basically the whole visible flight -- if you can see it and it's in your sights, you can hit it
// rev21: interstitial durations -- short (1s) for an ordinary life
// lost since play resumes right after, longer (3s) for the final life so
// the "hull breach" beat has room to land before the GAME OVER screen.
const LIFE_LOST_SECONDS = 1;
const GAME_OVER_SECONDS = 3;
const LIVES_START = 3;
const EXTRA_LIFE_SCORE = 10000; // extra life every 10000 points
const SCORE_FOR_TIER = {3:100, 2:175, 1:250}; // rev3: big rock 100, medium 175 (midpoint), small 250
const ASTEROID_RADIUS = {3:9, 2:5.2, 1:2.8};
const MOUSE_DEADZONE = 20;   // px around viewport center with no steering input
const CROSSHAIR_LAG_RATE = 3.2; // rev6: increased -- the crosshair now visibly trails the raw cursor, not instant

function rand(a,b){ return a + Math.random()*(b-a); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function lerp(a,b,t){ return a + (b-a)*t; }
// rev14: haptic feedback (Android Chrome supports Vibration API; iOS Safari
// doesn't -- this is a no-op there, not a broken feature).
function vibrate(pattern){
  if(navigator.vibrate) navigator.vibrate(pattern);
}
// rev4: maps a mouse-vs-center offset to a [-1,1] steering axis, with a
// deadzone near center and full magnitude at `range` pixels out
function axisInput(d, range){
  if(Math.abs(d) < MOUSE_DEADZONE) return 0;
  const mag = clamp((Math.abs(d)-MOUSE_DEADZONE)/(range-MOUSE_DEADZONE), 0, 1);
  return Math.sign(d)*mag;
}
// rev5: where the cannon/crosshair actually points. rev6: this is now the
// LAGGED cursor position (aimIndX/Y, eased toward the raw mouse each
// frame in update()), clamped to the forward viewport so it can't wander
// into the console.
function aimPoint(){
  return { x: clamp(aimIndX, 0, W), y: clamp(aimIndY, 0, VIEW_H) };
}

// ---------- AUDIO ----------
// Same beep()-based blip SFX pattern as asteroids-green-zc-controls.html.
let audioCtx;
function ensureAudio(){
  if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(audioCtx.state === 'suspended'){ audioCtx.resume(); }
}
function beep(freq, dur, type, vol, delay){
  if(!audioCtx) return;
  type = type||'square'; vol = vol===undefined?0.05:vol; delay = delay||0;
  const startAt = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start(startAt);
  g.gain.exponentialRampToValueAtTime(0.0001, startAt + dur);
  o.stop(startAt + dur);
}
// rev14: rock impacts are now a filtered noise burst ("crunch") instead of
// a tonal blip -- a short buffer of white noise with a decaying envelope,
// run through a lowpass whose cutoff sets how deep/crisp the crunch reads
// (low cutoff = big dull thud, high cutoff = small sharp crack).
// rev21: the sample-fill loop that builds the noise buffer was running
// on EVERY call -- harmless occasionally, but rapid-fire (up to ~22
// shots/sec) meant it could fire many times a second on sustained hit
// streaks, and that synchronous main-thread work was a real, measurable
// contributor to the freezing/jank reported on phones. The buffer is
// generated once, lazily, and reused for every crunch() after that --
// each call now just wires up cheap, disposable nodes around the same
// shared buffer instead of re-filling ~10-15k samples every time.
let noiseBufferCache = null;
function getNoiseBuffer(){
  if(noiseBufferCache) return noiseBufferCache;
  const dur = 0.4; // longest crunch duration we ever need; shorter ones just play a prefix
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buffer = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<n;i++){
    data[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 2);
  }
  noiseBufferCache = buffer;
  return noiseBufferCache;
}
function crunch(dur, vol, filterFreq){
  if(!audioCtx) return;
  const src = audioCtx.createBufferSource();
  src.buffer = getNoiseBuffer();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = filterFreq;
  const g = audioCtx.createGain();
  g.gain.value = vol;
  src.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}
// rev21: fire is always at full rapid-fire rate now (no more ramp), so
// this always plays the loud/sharp version.
function sfxFire(){ beep(2100, 0.045, 'square', 0.11); }
function sfxHitBig(){ crunch(0.22, 0.22, 900); }
function sfxHitSmall(){ crunch(0.15, 0.16, 1400); }
function sfxDestroyed(){ crunch(0.12, 0.14, 1900); }
function sfxHullHit(){ crunch(0.35, 0.26, 500); }
function sfxStart(){
  beep(220, 0.08, 'square', 0.05, 0);
  beep(440, 0.08, 'square', 0.05, 0.08);
  beep(660, 0.12, 'square', 0.05, 0.16);
}
function sfxGameOver(){
  [300,240,180,120].forEach((f,i)=> beep(f, 0.22, 'sawtooth', 0.08, i*0.15));
}
function sfxSelect(){ beep(660, 0.04, 'sine', 0.06); }
function sfxExtraLife(){ beep(1200, 0.15, 'sine', 0.06); }

// rev8: sustained low buzzing oscillator for the 5s life-lost interstitial,
// distinct from the one-shot sfxHullHit() blip -- a square-wave LFO
// modulates the oscillator's frequency to give it a rough, unstable buzz.
let buzzOsc = null, buzzGain = null, buzzLFO = null;
function startBuzz(){
  if(!audioCtx || buzzOsc) return;
  buzzOsc = audioCtx.createOscillator();
  buzzGain = audioCtx.createGain();
  buzzOsc.type = 'sawtooth';
  buzzOsc.frequency.value = 55;
  buzzGain.gain.value = 0.05;
  buzzLFO = audioCtx.createOscillator();
  buzzLFO.type = 'square';
  buzzLFO.frequency.value = 14;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 40;
  buzzLFO.connect(lfoGain);
  lfoGain.connect(buzzOsc.frequency);
  buzzOsc.connect(buzzGain);
  buzzGain.connect(audioCtx.destination);
  buzzOsc.start();
  buzzLFO.start();
}
function stopBuzz(){
  if(!buzzOsc) return;
  try{ buzzOsc.stop(); buzzLFO.stop(); }catch(e){}
  buzzOsc.disconnect(); buzzGain.disconnect(); buzzLFO.disconnect();
  buzzOsc = null; buzzGain = null; buzzLFO = null;
}

// ---------- STATE ----------
// rev3: 'nameentry' sits between 'menu' and 'playing'
let state = 'menu'; // menu | nameentry | playing | gameover
let asteroids = [], tracers = [], particles = [];
let shipOffsetX = 0, shipOffsetY = 0;
let forwardSpeed = SPEED_DEFAULT;
let roll = 0; // current banking tilt, radians
let headingIndX = 0, headingIndY = 0; // eased steering-direction needle for the HEADING gauge
let fireCooldown = 0;
let score = 0;
let lives = LIVES_START, nextLifeScore = EXTRA_LIFE_SCORE;
let gameOverPending = false; // rev21: true while the final life's interstitial is playing out
let rocksDestroyed = 0;
let hitFlash = 0, shake = 0;
let invuln = 0;
let lifeLostTimer = 0; // rev7: >0 while the "broken cockpit" interstitial between lives is showing
let lifeLostImpact = {x:0, y:0}; // rev8: crack graphic radiates from this point
let crackLines = []; // rev8: jagged red crack-line segments for the life-lost screen
// rev21: the cursor wheel is the only aim/flight input now -- 'up' | 'down' |
// 'left' | 'right' | null, set by whichever quadrant is currently pressed
// (see computeWheelQuadrant()/updateWheelMouse()).
let wheelDir = null;
let mouseHeld = false;
let mouseX = CENTER_X, mouseY = CENTER_Y;
let aimIndX = CENTER_X, aimIndY = CENTER_Y; // rev6: eased crosshair position, trails mouseX/Y
let lastTime = 0;

// rev21: the on-screen cursor wheel (see wheelDir below) drives
// mouseX/mouseY directly -- it's the only aim/flight input now. The
// phone gyroscope, the old rectangular D-pad, and touch-drag-in-the-
// viewport have all been removed.

// rev3: 3-digit callsign entered once per session, keyboard-driven (no
// touch/mouse targets in this game) -- reused on every "NEW GAME" restart
let playerDigits = [0,0,0];
let activeDigitIndex = 0;

// rev3: local top-10 leaderboard, same idea as the word game's (see
// word-game-scores/README.md for why this can't push to the repo itself)
const LEADERBOARD_KEY = 'spaceShipLeaderboard';
function loadLeaderboard(){
  try{
    const raw = localStorage.getItem(LEADERBOARD_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  }catch(e){ return []; }
}
function saveLeaderboard(list){
  try{ localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(list)); }catch(e){}
}
function recordScore(name, finalScore){
  const list = loadLeaderboard();
  list.push({ name, score: finalScore, date: new Date().toISOString() });
  list.sort((a,b)=>b.score-a.score);
  const top10 = list.slice(0,10);
  saveLeaderboard(top10);
  return top10;
}
let leaderboard = loadLeaderboard();

// rev21: regenerateStars() is defined here but declared as `stars`
// much earlier (right after the LAYOUT section) -- it must exist before
// resizeCanvas()'s initial call, which runs immediately after its own
// definition and populates the field the first time.
function regenerateStars(){
  stars = [];
  for(let i=0;i<70;i++){
    stars.push({ x:rand(0,W), y:rand(0,VIEW_H), r:rand(0.5,1.5), phase:rand(0,Math.PI*2) });
  }
}

// ---------- ASTEROID FIELD ----------
function makeShape(){
  const n = Math.floor(rand(8,13));
  const offsets = [];
  for(let i=0;i<n;i++) offsets.push(rand(0.75,1.25));
  return offsets;
}
function makeStaticAsteroid(x, y, z){
  // rev8: field rocks are fully static (no vx/vy) -- the ship flies toward
  // a fixed field, not the other way around. The only things that ever
  // move under their own velocity are fragments from breakAsteroid().
  return {
    x, y, z: clamp(z, FIELD_Z_MIN, FIELD_Z_MAX),
    vx: 0, vy: 0,
    tier: 3,
    worldRadius: ASTEROID_RADIUS[3],
    angle: rand(0, Math.PI*2),
    spin: rand(-0.15, 0.15), // slow cosmetic tumble only, no positional drift
    offsets: makeShape(),
    checkedCollision: false,
    trail: []
  };
}
// rev8: one-shot static field builder, called at game start. 2-3 weighted
// density clusters are scattered through the field volume, plus a thin
// ambient scatter so it doesn't look empty between them.
function generateField(){
  asteroids = []; tracers = []; particles = [];

  const clusterCount = Math.floor(rand(CLUSTER_COUNT_MIN, CLUSTER_COUNT_MAX+1));
  const clusters = [];
  for(let i=0;i<clusterCount;i++){
    clusters.push({
      x: rand(-FIELD_SPAN, FIELD_SPAN),
      y: rand(-FIELD_SPAN*0.7, FIELD_SPAN*0.7),
      z: rand(FIELD_Z_MIN+200, FIELD_Z_MAX-150),
      spread: rand(90, 220), // rev10: widened -- rocks were clumping/overlapping visually
      weight: rand(0.5, 1.4)
    });
  }

  for(const c of clusters){
    const n = Math.floor(rand(CLUSTER_ROCK_MIN, CLUSTER_ROCK_MAX+1) * c.weight);
    for(let i=0;i<n;i++){
      asteroids.push(makeStaticAsteroid(
        c.x + rand(-1,1)*c.spread,
        c.y + rand(-1,1)*c.spread*0.7,
        c.z + rand(-1,1)*c.spread*1.5
      ));
    }
  }
  for(let i=0;i<AMBIENT_ROCK_COUNT;i++){
    asteroids.push(makeStaticAsteroid(
      rand(-FIELD_SPAN*1.4, FIELD_SPAN*1.4),
      rand(-FIELD_SPAN, FIELD_SPAN),
      rand(FIELD_Z_MIN, FIELD_Z_MAX)
    ));
  }

  topUpCooldown = 0; // rev9: re-check immediately after a fresh field
}

// rev9: the field must be infinite -- flying far enough eventually emptied
// the old one-shot field, leaving blank space ahead. Instead of generating
// it all up front and stopping, this keeps topping up fresh density
// clusters just ahead of the ship (never behind, never at a
// fixed world origin) so there's always more field to fly into, no matter
// how far or how long you fly. Rocks spawned this way are just as static
// as the initial field -- only fragments from a hit ever move.
let topUpCooldown = 0;
const TOPUP_CHECK_INTERVAL = 0.5;
function topUpFieldAhead(dt){
  topUpCooldown -= dt;
  if(topUpCooldown > 0) return;
  topUpCooldown = TOPUP_CHECK_INTERVAL;

  let furthestZ = 0;
  for(const a of asteroids){
    if(a.tier===3 && a.z > furthestZ) furthestZ = a.z;
  }
  if(furthestZ >= FIELD_Z_MAX*0.7) return; // still plenty of field ahead

  const clusterCount = Math.floor(rand(1,3));
  for(let c=0;c<clusterCount;c++){
    const cx = shipOffsetX + rand(-FIELD_SPAN, FIELD_SPAN);
    const cy = shipOffsetY + rand(-FIELD_SPAN*0.7, FIELD_SPAN*0.7);
    const cz = rand(FIELD_Z_MAX*0.6, FIELD_Z_MAX);
    const spread = rand(90,220), weight = rand(0.5,1.4); // rev10: widened, matches generateField
    const n = Math.floor(rand(CLUSTER_ROCK_MIN, CLUSTER_ROCK_MAX+1) * weight);
    for(let i=0;i<n;i++){
      asteroids.push(makeStaticAsteroid(
        cx + rand(-1,1)*spread,
        cy + rand(-1,1)*spread*0.7,
        cz + rand(-1,1)*spread*1.5
      ));
    }
  }
  const ambientN = Math.floor(AMBIENT_ROCK_COUNT * 0.5);
  for(let i=0;i<ambientN;i++){
    asteroids.push(makeStaticAsteroid(
      shipOffsetX + rand(-FIELD_SPAN*1.4, FIELD_SPAN*1.4),
      shipOffsetY + rand(-FIELD_SPAN, FIELD_SPAN),
      rand(FIELD_Z_MAX*0.6, FIELD_Z_MAX)
    ));
  }
}

// Projects a world point to screen space, including the cosmetic banking
// roll -- baked in here (not via ctx.rotate) so hit-testing and rendering
// always agree on exactly where something appears.
function project(a){
  const rx = (a.x - shipOffsetX) * FOV_SCALE / a.z;
  const ry = (a.y - shipOffsetY) * FOV_SCALE / a.z;
  const cosR = Math.cos(roll), sinR = Math.sin(roll);
  return {
    x: CENTER_X + rx*cosR - ry*sinR,
    y: CENTER_Y + rx*sinR + ry*cosR,
    r: a.worldRadius * FOV_SCALE / a.z
  };
}

// ---------- GAME RESET ----------
function resetGame(){
  shipOffsetX = 0; shipOffsetY = 0;
  forwardSpeed = SPEED_DEFAULT;
  roll = 0;
  headingIndX = 0; headingIndY = 0;
  aimIndX = mouseX; aimIndY = mouseY;
  fireCooldown = 0;
  mouseHeld = false;
  score = 0;
  lives = LIVES_START; nextLifeScore = EXTRA_LIFE_SCORE;
  rocksDestroyed = 0;
  hitFlash = 0; shake = 0;
  lifeLostTimer = 0;
  gameOverPending = false;
  invuln = 60/60; // brief grace on spawn
  wheelDir = null;
  generateField();
}
// rev17: this build is phone-only -- the browser's own address bar/
// toolbar chrome eats a big chunk of an already-small screen, so always
// request fullscreen on game start (from this same tap gesture, which
// browsers require). Calls that fail or aren't supported are silently
// ignored rather than blocking play.
function requestFullscreen(){
  const el = document.documentElement;
  const req = el.requestFullscreen || el.webkitRequestFullscreen;
  if(req){
    try{ req.call(el).catch(()=>{}); }catch(e){}
  }
}
function startGame(){
  ensureAudio();
  if(state !== 'playing'){
    resetGame();
    state = 'playing';
    centerMsg.style.display = 'none';
    sfxStart();
    requestFullscreen();
  }
}

// ---------- MENU / NAME-ENTRY / GAME-OVER SCREENS (DOM overlay) ----------
function leaderboardHTML(){
  if(leaderboard.length===0) return '<p class="small">NO SCORES YET</p>';
  return '<div class="lb">' + leaderboard.slice(0,10).map((e,i)=>
    '<div class="lbrow' + (i===0?' top':'') + '"><span>' + (i+1) + '. ' + e.name + '</span><span>' +
    String(e.score).padStart(6,'0') + '</span></div>'
  ).join('') + '</div>';
}
function renderTitleScreen(){
  centerMsg.innerHTML =
    '<h1>SPACE SHIP</h1>' +
    '<p>AIM/FLY: PRESS A SEGMENT OF THE CURSOR WHEEL</p>' +
    '<p>HOLD FIRE TO SHOOT -- CONTINUOUS RAPID FIRE</p>' +
    '<p>THROTTLE: DRAG THE SPEED SLIDER</p>' +
    '<p class="small">TAP TO BEGIN</p>' +
    '<div class="heading">TOP SCORES</div>' +
    leaderboardHTML();

}
function renderNameEntry(){

    '<div class="heading">ENTER CALLSIGN</div>' +
    '<p class="small">ARROW UP/DOWN CHANGE DIGIT &nbsp; LEFT/RIGHT CHANGE SLOT &nbsp; CLICK TO CONFIRM</p>' +
    '<div class="digits">' + playerDigits.map((d,i)=>
      '<div class="digitBox' + (i===activeDigitIndex?' active':'') + '">' + d + '</div>'
    ).join('') + '</div>';
  centerMsg.style.display = 'block';
}
function moveDigitSlot(dir){
  activeDigitIndex = clamp(activeDigitIndex+dir, 0, 2);
  sfxSelect();
  renderNameEntry();
}
function cycleDigit(dir){
  playerDigits[activeDigitIndex] = ((playerDigits[activeDigitIndex]+dir)%10+10)%10;
  sfxSelect();
  renderNameEntry();
}
function confirmNameEntry(){

}
function showGameOver(){

    '<h1>HULL BREACH</h1>' +
    '<p>' + playerDigits.join('') + ' — FINAL SCORE: ' + score + '</p>' +

    '<div class="heading">TOP SCORES</div>' +

// rev7: same "broken cockpit" visual used for both an ordinary life lost
// (LIFE_LOST_SECONDS, then auto-dismissed and play resumes) and the
// final life (GAME_OVER_SECONDS, then leads into the real GAME OVER
// screen -- see gameOverPending in update()).
// rev12: back to plain white -- red was reserved for the (now-removed)
// stargates, and this game is otherwise monochrome.
function showLifeLostScreen(){
  centerMsg.innerHTML =
    '<h1>HULL BREACH</h1>' +
    '<p>LIVES REMAINING: ' + lives + '</p>' +
    '<p class="small">COCKPIT SYSTEMS REBOOTING…</p>';
  centerMsg.style.display = 'block';
}

// ---------- INPUT ----------
// rev4: mouse steers (position relative to the viewport center) and fires
// (click; holding down gives max cooldown-limited rate, no toggle). Arrow
// Up/Down are the only keyboard gameplay control now (speed) -- the same
// arrow keys double as name-entry navigation while state==='nameentry',
// same dual-purpose pattern rev3 used for A/D/W/X.
const PREVENT_CODES = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter'];

function handlePrimaryAction(){
  if(state==='menu'){
    ensureAudio();
    state = 'nameentry';
    renderNameEntry();
    sfxSelect();
  } else if(state==='nameentry'){
    confirmNameEntry();
  } else if(state==='gameover'){
    startGame();
  }
}

window.addEventListener('keydown', (e)=>{
  if(PREVENT_CODES.includes(e.code)) e.preventDefault();

  if(!e.repeat){
    if(state==='nameentry'){
      if(e.code==='ArrowLeft') moveDigitSlot(-1);
      if(e.code==='ArrowRight') moveDigitSlot(1);
      if(e.code==='ArrowUp') cycleDigit(1);
      if(e.code==='ArrowDown') cycleDigit(-1);
    }
    if(e.code==='Enter') handlePrimaryAction();
  }
});

// rev21: three independent physical controls now, each its own pointer --
// the cursor wheel (aim + flight), the vertical FIRE rectangle, and the
// vertical speed slider. Nothing in the forward viewport responds to
// touch any more (the wheel replaced drag-to-aim, same as it replaced
// the phone gyroscope and the old rectangular D-pad).
const activePointers = new Map(); // pointerId -> 'fire' | 'wheel' | 'slider'

function pointerCanvasPos(e){
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
  return { x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY };
}

// rev21: which of the cursor wheel's four pie-slice quadrants (if any) a
// canvas-space point falls in. atan2's zero points right and increases
// clockwise in canvas coordinates (y grows downward), so the X-divided
// quadrants land exactly on the +/-45 degree boundaries.
function computeWheelQuadrant(px, py){
  if(!layout) return null;
  const dx = px - layout.wheel.cx, dy = (py - CONSOLE_Y) - layout.wheel.cy;
  if(Math.hypot(dx, dy) > layout.wheel.r) return null;
  const ang = Math.atan2(dy, dx);
  if(ang >= -Math.PI/4 && ang < Math.PI/4) return 'right';
  if(ang >= Math.PI/4 && ang < Math.PI*3/4) return 'down';
  if(ang >= -Math.PI*3/4 && ang < -Math.PI/4) return 'up';
  return 'left';
}
function setSliderFromPoint(py){
  const localY = py - CONSOLE_Y;
  const t = clamp(1 - (localY - layout.slider.trackY)/layout.slider.trackH, 0, 1);
  forwardSpeed = SPEED_MIN + t*(SPEED_MAX - SPEED_MIN);
}

canvas.addEventListener('pointermove', (e)=>{
  const role = activePointers.get(e.pointerId);
  if(!role || !layout) return;
  const p = pointerCanvasPos(e);
  if(role === 'wheel') wheelDir = computeWheelQuadrant(p.x, p.y);
  else if(role === 'slider') setSliderFromPoint(p.y);
});
canvas.addEventListener('pointerdown', (e)=>{
  ensureAudio();
  if(state!=='playing' || !layout) return;
  const p = pointerCanvasPos(e);
  if(hitButton(p.x, p.y, layout.btnFire)){
    mouseHeld = true;
    activePointers.set(e.pointerId, 'fire');
  } else if(hitButton(p.x, p.y, layout.sliderHit)){
    activePointers.set(e.pointerId, 'slider');
    setSliderFromPoint(p.y);
  } else {
    const q = computeWheelQuadrant(p.x, p.y);
    if(q){
      wheelDir = q;
      activePointers.set(e.pointerId, 'wheel');
    }
  }
});
function releasePointer(e){
  const role = activePointers.get(e.pointerId);
  if(role==='fire') mouseHeld = false;
  if(role==='wheel') wheelDir = null;
  activePointers.delete(e.pointerId);
}
canvas.addEventListener('pointerup', releasePointer);
canvas.addEventListener('pointercancel', releasePointer);
canvas.addEventListener('click', handlePrimaryAction);
centerMsg.addEventListener('click', handlePrimaryAction);

// rev21: feeds the wheel's held direction into the same mouseX/mouseY the
// mouse/touch-drag/gyro used to drive, so the existing crosshair-easing
// and axisInput() steering code downstream is reused completely
// unchanged -- just a new (and now the only) source for those variables.
function updateWheelMouse(){
  if(wheelDir === 'left'){ mouseX = 0; mouseY = CENTER_Y; }
  else if(wheelDir === 'right'){ mouseX = W; mouseY = CENTER_Y; }
  else if(wheelDir === 'up'){ mouseX = CENTER_X; mouseY = 0; }
  else if(wheelDir === 'down'){ mouseX = CENTER_X; mouseY = VIEW_H; }
  else { mouseX = CENTER_X; mouseY = CENTER_Y; }
}

// ---------- FIRING ----------
// rev21: hard cap on total live particles -- a sustained rapid-fire
// kill streak (up to 30 particles per tier-3 rock, several rocks a
// second) could otherwise pile up faster than they decay, adding to the
// per-frame draw cost right when the game is already busiest. Oldest
// particles get dropped first to make room, same as a ring buffer.
const PARTICLE_MAX = 220;
function spawnParticles(x,y,count,speedMax){
  for(let i=0;i<count;i++){
    if(particles.length >= PARTICLE_MAX) particles.shift();
    const ang = rand(0,Math.PI*2);
    const spd = rand(0.5, speedMax);
    particles.push({
      x, y,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd,
      life: rand(20,50), maxLife:50
    });
  }
}

function breakAsteroid(a, index){
  const p = project(a);
  // rev3: bigger, denser white-dot explosion bursts
  const burstCount = a.tier===3 ? 30 : a.tier===2 ? 20 : 14;
  spawnParticles(p.x, p.y, burstCount, a.tier+1.5);
  score += SCORE_FOR_TIER[a.tier];
  rocksDestroyed++;
  if(score >= nextLifeScore){
    lives++;
    nextLifeScore += EXTRA_LIFE_SCORE;
    sfxExtraLife();
  }
  if(a.tier===3) sfxHitBig(); else if(a.tier===2) sfxHitSmall(); else sfxDestroyed();

  if(a.tier > 1){
    // rev6: each fragment independently rolls whether it gets flung clear
    // on a radical tangent (DEFLECT_CHANCE, ~70%) or keeps heading roughly
    // toward the ship (the other 30%) -- hitting a rock once USUALLY
    // clears the danger from its pieces, but not always.
    const relX = a.x - shipOffsetX, relY = a.y - shipOffsetY;
    const dist = Math.hypot(relX, relY) || 1;
    const perpX = -relY/dist, perpY = relX/dist;
    for(let i=0;i<2;i++){
      const deflect = Math.random() < DEFLECT_CHANCE;
      let vx, vy;
      if(deflect){
        const dir = i===0 ? 1 : -1; // send the pair apart, opposite tangents
        const kick = rand(DEFLECT_KICK_MIN, DEFLECT_KICK_MAX);
        vx = perpX*kick*dir + rand(-4,4);
        vy = perpY*kick*dir + rand(-4,4);
      } else {
        vx = a.vx + rand(-3,3);
        vy = a.vy + rand(-3,3);
      }
      asteroids.push({
        x:a.x, y:a.y, z:a.z,
        vx, vy,
        tier: a.tier-1,
        worldRadius: ASTEROID_RADIUS[a.tier-1],
        angle: rand(0,Math.PI*2), spin: rand(-1,1),
        offsets: makeShape(),
        checkedCollision: false,
        trail: [] // rev6: fresh trail, doesn't inherit the parent's history
      });
    }
  }
  asteroids.splice(index,1);
}

function fire(){
  if(state!=='playing') return;
  if(fireCooldown > 0) return;
  // rev21: fully continuous rapid fire -- one fixed fast cooldown, no
  // ramp-up, no heat/overheat system to interrupt it.
  fireCooldown = FIRE_COOLDOWN;
  sfxFire();

  // rev5: the cannon aims wherever the cursor is, not a fixed center --
  // hit test is the nearest asteroid inside a cone around the CURSOR.
  const aim = aimPoint();
  let best = null, bestIndex = -1, bestZ = Infinity;
  for(let i=0;i<asteroids.length;i++){
    const a = asteroids[i];
    if(a.z < ENGAGE_Z_MIN || a.z > ENGAGE_Z_MAX) continue;
    const p = project(a);
    const dx = p.x-aim.x, dy = p.y-aim.y;
    const coneR = p.r*1.3 + 10;
    if(Math.hypot(dx,dy) <= coneR && a.z < bestZ){
      best = p; bestIndex = i; bestZ = a.z;
    }
  }

  const startY = VIEW_H - 18;
  // rev5: the tracer always travels to the cursor position, hit or miss.
  // rev14: doubled up into a twin-cannon pair (offset left/right at the
  // muzzle, converging on the same aim point), instead of a single bolt.
  const TRACER_MUZZLE_OFFSET = 22;
  tracers.push({
    t:0, dur:0.15,
    startX: CENTER_X - TRACER_MUZZLE_OFFSET, startY,
    endX: aim.x,
    endY: aim.y
  });
  tracers.push({
    t:0, dur:0.15,
    startX: CENTER_X + TRACER_MUZZLE_OFFSET, startY,
    endX: aim.x,
    endY: aim.y
  });

  if(best) breakAsteroid(asteroids[bestIndex], bestIndex);
}

// ---------- UPDATE ----------
function update(dt){
  if(state !== 'playing'){ return; }
  updateWheelMouse();

  // rev9: the "hull breach" interstitial between lives is continuous
  // shake + buzz instead of a quick fade -- everything else (steering,
  // firing, asteroid motion) stays frozen throughout.
  // rev21: also used for the final life now -- gameOverPending marks
  // that this interstitial should lead into the actual game-over screen
  // instead of resuming play once it finishes.
  if(lifeLostTimer > 0){
    lifeLostTimer -= dt;
    shake = 0.7 + 0.3*Math.abs(Math.sin(lifeLostTimer*14));
    if(lifeLostTimer <= 0){
      shake = 0;
      stopBuzz();
      if(gameOverPending){
        gameOverPending = false;
        state = 'gameover';
        sfxGameOver();
        leaderboard = recordScore(playerDigits.join(''), score);
        showGameOver();
      } else {
        invuln = 1.5;
        centerMsg.style.display = 'none';
      }
    }
    return;
  }

  // rev21: the cursor wheel is now the only aim/flight input, and FIRE is
  // a separate physical control (a button, not the same "cursor" the
  // wheel uses) -- so unlike the old mouse-based single-cursor model,
  // there's no inherent conflict between aiming and firing any more, and
  // steering no longer needs to lock while firing (you can hold FIRE and
  // steer with the wheel at the same time, like a two-thumb dual-stick
  // shooter). The crosshair still eases toward the wheel-driven
  // mouseX/mouseY, and steering still eases toward the same axis.
  aimIndX += (mouseX - aimIndX) * Math.min(1, dt*CROSSHAIR_LAG_RATE);
  aimIndY += (mouseY - aimIndY) * Math.min(1, dt*CROSSHAIR_LAG_RATE);

  const steerDirX = axisInput(mouseX-CENTER_X, W/2);
  const steerDirY = axisInput(mouseY-CENTER_Y, VIEW_H/2);
  headingIndX += (steerDirX - headingIndX) * Math.min(1, dt*STEER_LAG_RATE);
  headingIndY += (steerDirY - headingIndY) * Math.min(1, dt*STEER_LAG_RATE);
  shipOffsetX += headingIndX*STEER_SPEED*dt;
  shipOffsetY += headingIndY*STEER_SPEED*dt;

  const targetRoll = -headingIndX * (MAX_ROLL_DEG*Math.PI/180);
  roll += (targetRoll - roll) * Math.min(1, dt*6);

  if(fireCooldown > 0) fireCooldown -= dt;
  // rev4: no more toggled auto-fire -- holding FIRE just fires every
  // frame the cooldown allows. rev21: that cooldown is now one fixed
  // fast rate the whole time (no ramp, no heat/overheat to interrupt it)
  // -- fully continuous rapid fire from the first frame it's held.
  if(mouseHeld) fire();

  if(invuln > 0) invuln -= dt;

  for(let i=asteroids.length-1; i>=0; i--){
    const a = asteroids[i];
    a.z -= forwardSpeed*dt;
    a.x += a.vx*dt; a.y += a.vy*dt;
    a.angle += a.spin*dt;

    // rev6: sample a motion-trail point each frame (screen space, so it
    // naturally follows the same perspective the rock itself is drawn
    // with) -- capped short so it reads as a trail, not a permanent streak.
    // Close to the vanishing point, small world-space drift gets hugely
    // amplified on screen by the perspective divide -- if a sample would
    // jump further than a rock-sized distance, restart the trail instead
    // of drawing one long zigzag streak across the screen.
    const tp = project(a);
    const lastPt = a.trail[a.trail.length-1];
    if(lastPt && Math.hypot(tp.x-lastPt.x, tp.y-lastPt.y) > Math.max(30, tp.r*4)){
      a.trail.length = 0;
    }
    a.trail.push({x:tp.x, y:tp.y});
    if(a.trail.length > 14) a.trail.shift();

    if(!a.checkedCollision && a.z <= COLLIDE_Z){
      a.checkedCollision = true;
      const relX = a.x - shipOffsetX, relY = a.y - shipOffsetY;
      if(invuln<=0 && Math.hypot(relX,relY) < PLAYER_HIT_RADIUS + a.worldRadius*0.4){
        shipHit();
      }
    }
    if(a.z <= CULL_Z){
      asteroids.splice(i,1);
    }
  }
  topUpFieldAhead(dt);

  for(let i=tracers.length-1;i>=0;i--){
    tracers[i].t += dt;
    if(tracers[i].t >= tracers[i].dur) tracers.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= 1;
    if(p.life <= 0) particles.splice(i,1);
  }

  if(hitFlash > 0) hitFlash -= dt*2.2;
  if(shake > 0) shake -= dt*3.5;
}

// rev21: lost the hull/health buffer entirely per request -- a single
// rock strike now costs a life outright, no multi-hit cushion. Still 3
// lives to start, still an extra life every EXTRA_LIFE_SCORE points.
function shipHit(){
  // rev21 bugfix: the collision loop can find several rocks crossing
  // COLLIDE_Z in the very same frame (easy to trigger with a lot of rocks
  // in view at once); it used to be safe because invuln got set inside
  // this function even on a "minor" hit, but that branch went away with
  // the hull buffer -- without re-adding a guard here, a single frame
  // with multiple simultaneous collisions could call shipHit() several
  // times before the interstitial actually freezes the game on the next
  // frame, chaining through multiple lives at once (observed: lives went
  // negative during testing). Bail out immediately if a hit is already
  // being processed.
  if(lifeLostTimer > 0 || gameOverPending) return;
  invuln = 1.4;
  hitFlash = 1;
  shake = 1;
  sfxHullHit();
  lives--;
  if(lives <= 0){
    // rev21: game over now plays the same shaky/buzzing interstitial
    // as a regular life loss (3s here vs 1s for a regular life, per
    // request) before the actual GAME OVER screen appears, instead of
    // cutting straight to it.
    gameOverPending = true;
    lifeLostTimer = GAME_OVER_SECONDS;
    lifeLostImpact = { x: rand(W*0.3, W*0.7), y: rand(VIEW_H*0.3, VIEW_H*0.7) };
    generateCrackLines();
    showLifeLostScreen();
    startBuzz();
    vibrate([60, 40, Math.round(GAME_OVER_SECONDS*1000)]);
    return;
  }
  lifeLostTimer = LIFE_LOST_SECONDS;
  lifeLostImpact = { x: rand(W*0.3, W*0.7), y: rand(VIEW_H*0.3, VIEW_H*0.7) };
  generateCrackLines();
  showLifeLostScreen();
  startBuzz();
  // rev14: a sharp impact pulse followed by a sustained buzz for the
  // whole interstitial -- matches the audio buzz already playing.
  vibrate([60, 40, Math.round(LIFE_LOST_SECONDS*1000)]);
}

// rev8: jagged red crack lines radiating out from a random impact point,
// generated once per life lost and held static for the whole interstitial.
function generateCrackLines(){
  crackLines = [];
  const n = 9;
  for(let i=0;i<n;i++){
    const ang = (i/n)*Math.PI*2 + rand(-0.2,0.2);
    const segs = Math.floor(rand(3,5));
    const totalLen = rand(180,340);
    const pts = [{x:lifeLostImpact.x, y:lifeLostImpact.y}];
    for(let s=1;s<=segs;s++){
      const len = totalLen*(s/segs);
      const jitter = rand(-18,18);
      pts.push({
        x: lifeLostImpact.x + Math.cos(ang)*len + Math.cos(ang+Math.PI/2)*jitter,
        y: lifeLostImpact.y + Math.sin(ang)*len + Math.sin(ang+Math.PI/2)*jitter
      });
    }
    crackLines.push(pts);
  }
}

// ---------- DRAW ----------
function drawStars(t){
  ctx.save();
  for(const s of stars){
    const a = 0.15 + 0.25*Math.abs(Math.sin(t*0.0006 + s.phase));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawGuideLines(){
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  const n = 8;
  for(let i=0;i<n;i++){
    const ang = (i/n)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(CENTER_X+Math.cos(ang)*22, CENTER_Y+Math.sin(ang)*22);
    ctx.lineTo(CENTER_X+Math.cos(ang)*260, CENTER_Y+Math.sin(ang)*260);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.045)';
  [90,190].forEach(r=>{
    ctx.beginPath();
    ctx.arc(CENTER_X, CENTER_Y, r, 0, Math.PI*2);
    ctx.stroke();
  });
  ctx.restore();
}

// rev6: fading motion trail behind a rock, tracing its recent path. Lives
// entirely on the rock's own `trail` array, so it vanishes the instant the
// rock is destroyed (spliced out of `asteroids`) and a fresh fragment
// starts with an empty trail of its own, not the parent's history.
function drawAsteroidTrail(a){
  if(a.trail.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  for(let i=1;i<a.trail.length;i++){
    const t0 = a.trail[i-1], t1 = a.trail[i];
    const age = i/a.trail.length; // 0 = oldest, 1 = newest
    ctx.strokeStyle = `rgba(255,255,255,${age*0.35})`;
    ctx.lineWidth = 0.5 + age*1.3;
    ctx.beginPath();
    ctx.moveTo(t0.x, t0.y);
    ctx.lineTo(t1.x, t1.y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroid(a){
  const p = project(a);
  if(p.x < -50 || p.x > W+50 || p.y < -50 || p.y > VIEW_H+50) return;
  drawAsteroidTrail(a);
  const depthT = clamp(1 - a.z/FIELD_Z_MAX, 0, 1);
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(a.angle);
  ctx.strokeStyle = `rgba(255,255,255,${0.35 + depthT*0.65})`;
  ctx.lineWidth = 1.5 + depthT*2;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 4 + depthT*8;
  ctx.beginPath();
  const n = a.offsets.length;
  for(let i=0;i<n;i++){
    const ang = (i/n)*Math.PI*2;
    const rr = p.r * a.offsets[i];
    const x = Math.cos(ang)*rr, y = Math.sin(ang)*rr;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// rev2: tracers are rectangular strips (not dots) that shrink in both
// length and width as they recede toward the vanishing point, rotated to
// align with their own direction of travel.
function drawTracers(){
  ctx.save();
  for(const tr of tracers){
    const prog = 1 - Math.pow(1-tr.t/tr.dur, 2); // ease-out
    const x = lerp(tr.startX, tr.endX, prog);
    const y = lerp(tr.startY, tr.endY, prog);
    const len = lerp(68, 6, prog); // rev3: bigger bullets
    const wid = lerp(14, 2, prog);
    const ang = Math.atan2(tr.endY-tr.startY, tr.endX-tr.startX);

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(ang);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 4 + (1-prog)*8;
    ctx.fillRect(-len/2, -wid/2, len, wid);
    ctx.restore();
  }
  ctx.restore();
}

function drawParticles(){
  ctx.save();
  for(const p of particles){
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// rev5: the crosshair now follows the cursor (the cannon's actual aim
// point), not a fixed screen-center reticle -- the vanishing point itself
// (drawGuideLines) stays fixed, since it's a property of the 3D projection,
// not of where the gun happens to be pointed.
function drawCrosshair(t){
  const aim = aimPoint();
  const pulse = 0.6 + 0.4*Math.sin(t*0.004);
  ctx.save();
  ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(aim.x, aim.y, 12, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(aim.x-20, aim.y); ctx.lineTo(aim.x-8, aim.y);
  ctx.moveTo(aim.x+8, aim.y); ctx.lineTo(aim.x+20, aim.y);
  ctx.moveTo(aim.x, aim.y-20); ctx.lineTo(aim.x, aim.y-8);
  ctx.moveTo(aim.x, aim.y+8); ctx.lineTo(aim.x, aim.y+20);
  ctx.stroke();
  ctx.restore();
}

// Decorative canopy framing -- no ship hull/nose is ever drawn, just the
// windshield edge and corner struts, so the craft itself stays unseen.
// rev6: triple parallel strokes instead of one thick bar, for a riveted
// aircraft-panel look -- every structural frame line uses this now.
function tripleLine(x1,y1,x2,y2, gap){
  gap = gap===undefined ? 3.5 : gap;
  const dx = x2-x1, dy = y2-y1;
  const len = Math.hypot(dx,dy) || 1;
  const nx = -dy/len, ny = dx/len;
  for(let i=-1;i<=1;i++){
    ctx.beginPath();
    ctx.moveTo(x1+nx*gap*i, y1+ny*gap*i);
    ctx.lineTo(x2+nx*gap*i, y2+ny*gap*i);
    ctx.stroke();
  }
}
// rev6: small rivet dots spaced along a frame line
function drawRivets(x1,y1,x2,y2, spacing){
  spacing = spacing===undefined ? 34 : spacing;
  const dx = x2-x1, dy = y2-y1;
  const len = Math.hypot(dx,dy);
  const n = Math.max(1, Math.floor(len/spacing));
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for(let i=1;i<n;i++){
    const t = i/n;
    ctx.beginPath();
    ctx.arc(x1+dx*t, y1+dy*t, 1.6, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

// rev21: simplified per request -- a single plain rectangle window, no
// trapezoid, no diagonal canopy dividers. Keeps the triple-line/rivet
// aircraft-panel look, just on one rectangle instead of a cone shape.
function drawFraming(){
  ctx.save();

  const topL = {x:4, y:4}, topR = {x:W-4, y:4};
  const botL = {x:4, y:VIEW_H-4}, botR = {x:W-4, y:VIEW_H-4};

  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.3;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 3;
  tripleLine(topL.x, topL.y, topR.x, topR.y);
  tripleLine(topR.x, topR.y, botR.x, botR.y);
  tripleLine(botR.x, botR.y, botL.x, botL.y);
  tripleLine(botL.x, botL.y, topL.x, topL.y);
  ctx.shadowBlur = 0;
  drawRivets(topL.x, topL.y, topR.x, topR.y);
  drawRivets(topR.x, topR.y, botR.x, botR.y);
  drawRivets(botR.x, botR.y, botL.x, botL.y);
  drawRivets(botL.x, botL.y, topL.x, topL.y);
  // small rivet clusters at each corner
  [topL, topR, botL, botR].forEach(p=>{
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    [[-6,-6],[6,-6],[-6,6],[6,6]].forEach(([ox,oy])=>{
      ctx.beginPath(); ctx.arc(p.x+ox, p.y+oy, 1.6, 0, Math.PI*2); ctx.fill();
    });
  });

  ctx.restore();
}

// rev14: on-console buttons (FIRE, FASTER, SLOWER) -- clickable with the
// mouse and tappable on touch, since a phone has no keyboard for the old
// Arrow Up/Down throttle or a "hold click anywhere" fire gesture. `btn` is
// one of the BTN_* rects; `pressed` lights it up while actively held.
function drawButton(btn, pressed){
  ctx.save();
  ctx.fillStyle = pressed ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.08)';
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 1.5;
  let labelX, labelY;
  if(btn.shape==='circle'){
    ctx.beginPath(); ctx.arc(btn.cx, btn.cy, btn.r, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    labelX = btn.cx; labelY = btn.cy;
  } else {
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
    labelX = btn.x+btn.w/2; labelY = btn.y+btn.h/2;
  }
  ctx.fillStyle = '#fff';
  ctx.font = (btn.shape==='circle' ? 'bold 22px' : 'bold 15px') + ' "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = pressed ? 10 : 0;
  ctx.fillText(btn.label, labelX, labelY+1);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// rev4: proper compass dial replacing the old dot-in-circle gauge -- rim,
// 12 clock-style ticks (4 major cardinal ▲▶▼◀ for up/right/down/left
// steering), and a needle whose length encodes input magnitude.
function drawCompassWheel(cx, cy, r, dirX, dirY){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();

  for(let i=0;i<12;i++){
    const ang = (i/12)*Math.PI*2 - Math.PI/2;
    const major = i%3===0;
    const r1 = major ? r-14 : r-8;
    ctx.strokeStyle = major ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.35)';
    ctx.lineWidth = major ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang)*r1, Math.sin(ang)*r1);
    ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
    ctx.stroke();
  }

  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = Math.round(r*0.26)+'px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▲', 0, -(r-26));
  ctx.fillText('▶', (r-26), 1);
  ctx.fillText('▼', 0, (r-26));
  ctx.fillText('◀', -(r-26), 1);

  const mag = Math.min(1, Math.hypot(dirX,dirY));
  if(mag > 0.02){
    const ang = Math.atan2(dirY,dirX);
    const len = r*0.72*mag;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(ang)*len, Math.sin(ang)*len);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// rev4: small Asteroids-style ship silhouette, used as a per-life icon in
// the console -- a HUD glyph, not a rendering of the player's own ship
// (which is still never shown in the forward viewport)
function drawShipIcon(cx, cy, size){
  ctx.save();
  ctx.translate(cx, cy);
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size*0.7, size*0.8);
  ctx.lineTo(0, size*0.35);
  ctx.lineTo(-size*0.7, size*0.8);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

// rev6: aircraft-style attitude/globe indicator -- a rotating ball horizon
// (sky above, hatched ground below) that banks with roll and shifts with
// vertical steering (a pitch analog), behind a fixed ship-reference symbol
function drawAttitudeGlobe(cx, cy, r, rollRad, pitchFrac){
  ctx.save();
  ctx.translate(cx, cy);

  ctx.save();
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
  ctx.rotate(rollRad);
  const pitchOffset = clamp(pitchFrac,-1,1) * r * 0.7;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(-r*1.6, -r*1.6, r*3.2, r*1.6+pitchOffset);
  ctx.fillStyle = 'rgba(255,255,255,0.16)';
  ctx.fillRect(-r*1.6, pitchOffset, r*3.2, r*1.6);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  for(let gy=pitchOffset+10; gy<r*1.6; gy+=12){
    ctx.beginPath(); ctx.moveTo(-r*1.6, gy); ctx.lineTo(r*1.6, gy); ctx.stroke();
  }
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(-r*1.6, pitchOffset); ctx.lineTo(r*1.6, pitchOffset); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  for(let k=-2;k<=2;k++){
    if(k===0) continue;
    const gy = pitchOffset + k*r*0.32;
    const wth = k%2===0 ? r*0.28 : r*0.16;
    ctx.beginPath(); ctx.moveTo(-wth, gy); ctx.lineTo(wth, gy); ctx.stroke();
  }
  ctx.restore();

  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(-r*0.55, 0); ctx.lineTo(-r*0.18, 0);
  ctx.moveTo(r*0.18, 0); ctx.lineTo(r*0.55, 0);
  ctx.moveTo(0,-r*0.12); ctx.lineTo(0, r*0.12);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// rev21: console redesigned around four big columns -- LIVES/HEADING/
// ATTITUDE stacked on the left, a full-height vertical SPEED slider, a
// big circular cursor wheel (the only aim/flight input now -- replaces
// the D-pad, touch-drag, AND the gyroscope), and a tall vertical FIRE
// rectangle -- each sized to use as much of its column as possible.
// RADAR, the DESTROYED counter, and the HEADING/ATTITUDE text labels are
// dropped entirely to give these four things maximum space. `layout` is
// also read by the pointer-input handler for hit-testing, so drawing and
// input always agree on where things are.
function computeLayout(){
  const padX = W*0.03;
  const contentW = W - padX*2;

  const rowScoreH = CONSOLE_H*0.12;
  const rowScoreY = 0;
  const contentY = rowScoreH;
  const contentH = CONSOLE_H - rowScoreH;

  const gap = contentW*0.025;
  const avail = contentW - gap*3;
  const col1W = avail*0.27;  // LIVES/HEADING/ATTITUDE
  const col2W = avail*0.15;  // SPEED slider
  const col3W = avail*0.40;  // cursor wheel
  const col4W = avail*0.18;  // FIRE

  const col1X = padX;
  const col2X = col1X + col1W + gap;
  const col3X = col2X + col2W + gap;
  const col4X = col3X + col3W + gap;

  // Left column: a compact LIVES icon row on top, HEADING and ATTITUDE
  // splitting the remaining height evenly beneath it, each as large as
  // the column width or its half-height allows.
  const livesRowH = contentH*0.13;
  const livesLabelY = contentY + livesRowH*0.7;
  const livesIconY = contentY + livesRowH*0.55;
  const livesIconR = livesRowH*0.36;
  const gaugesAreaH = contentH - livesRowH;
  const headingCX = col1X + col1W/2;
  const headingCY = contentY + livesRowH + gaugesAreaH*0.25;
  const headingR = Math.min(col1W*0.48, gaugesAreaH*0.23);
  const attitudeCX = col1X + col1W/2;
  const attitudeCY = contentY + livesRowH + gaugesAreaH*0.75;
  const attitudeR = Math.min(col1W*0.48, gaugesAreaH*0.23);

  // Speed slider: the track spans the full column height -- bottom =
  // SPEED_MIN, top = SPEED_MAX -- per "0 bottom to max speed top". A
  // small header above the track holds the SPEED label + numeric
  // readout (below the track would overflow past CONSOLE_H). The
  // hit-rect for dragging covers the WHOLE column (not just the narrow
  // track) so it's easy to grab on a phone.
  const sliderHeaderH = contentH*0.13;
  const sliderMarginBottom = contentH*0.04;
  const trackW = col2W*0.42;
  const slider = {
    trackX: col2X + (col2W-trackW)/2,
    trackY: contentY + sliderHeaderH,
    trackW,
    trackH: contentH - sliderHeaderH - sliderMarginBottom,
    labelY: contentY + sliderHeaderH*0.42,
    valueY: contentY + sliderHeaderH*0.88
  };
  const sliderHit = {x: col2X, y: contentY, w: col2W, h: contentH};

  // Cursor wheel: a circle with an X through it, filling the wider of
  // its column -- limited by whichever of column width / content height
  // is smaller so it never overflows either axis.
  const wheel = {
    cx: col3X + col3W/2,
    cy: contentY + contentH/2,
    r: Math.min(col3W, contentH)*0.47
  };

  // FIRE: one tall vertical rectangle, filling almost the whole column.
  const fireMarginY = contentH*0.04;
  const btnFire = {
    x: col4X, y: contentY+fireMarginY, w: col4W, h: contentH-fireMarginY*2,
    label: 'FIRE'
  };

  return {
    padX, contentW,
    rowScoreY, rowScoreH,
    livesRowH, livesLabelY, livesIconY, livesIconR, col1X, col1W,
    headingCX, headingCY, headingR,
    attitudeCX, attitudeCY, attitudeR,
    slider, sliderHit,
    wheel,
    btnFire
  };
}

function drawSpeedSlider(L){
  const s = L.slider;
  const t = clamp((forwardSpeed-SPEED_MIN)/(SPEED_MAX-SPEED_MIN), 0, 1);
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(s.trackX, s.trackY, s.trackW, s.trackH);
  const fillH = s.trackH*t;
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(s.trackX, s.trackY+s.trackH-fillH, s.trackW, fillH);

  const knobY = s.trackY + s.trackH*(1-t);
  const knobW = s.trackW*1.7, knobH = Math.max(10, s.trackW*0.32);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
  ctx.fillRect(s.trackX+s.trackW/2-knobW/2, knobY-knobH/2, knobW, knobH);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.font = 'bold ' + Math.max(9, s.trackW*0.42) + 'px "Courier New", monospace';
  ctx.fillText('SPEED', s.trackX+s.trackW/2, s.labelY);
  ctx.font = 'bold ' + Math.max(12, s.trackW*0.55) + 'px "Courier New", monospace';
  ctx.fillText(String(Math.round(forwardSpeed)), s.trackX+s.trackW/2, s.valueY);
  ctx.restore();
}

// rev21: a circle with an X through it -- the four pie slices between
// the diagonals are the up/right/down/left quadrants (matches the angle
// ranges computeWheelQuadrant() uses in the pointer handler exactly).
function drawWheel(cx, cy, r, activeDir){
  ctx.save();
  ctx.translate(cx, cy);

  if(activeDir){
    const ranges = {
      right: [-Math.PI/4, Math.PI/4],
      down:  [Math.PI/4, Math.PI*3/4],
      left:  [Math.PI*3/4, Math.PI*5/4],
      up:    [-Math.PI*3/4, -Math.PI/4]
    };
    const [a0,a1] = ranges[activeDir];
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.arc(0,0,r,a0,a1);
    ctx.closePath();
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();

  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  const d = r*Math.SQRT1_2;
  ctx.beginPath();
  ctx.moveTo(-d,-d); ctx.lineTo(d,d);
  ctx.moveTo(-d,d); ctx.lineTo(d,-d);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = Math.round(r*0.3) + 'px "Courier New", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('▲', 0, -r*0.52);
  ctx.fillText('▶', r*0.52, 1);
  ctx.fillText('▼', 0, r*0.52);
  ctx.fillText('◀', -r*0.52, 1);

  ctx.restore();
}

function drawConsole(){
  layout = computeLayout();
  const L = layout;
  ctx.save();
  ctx.translate(0, CONSOLE_Y);

  // rev6: triple-line + rivets, matching the viewport's aircraft-frame style
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.3;
  tripleLine(0, 3, W, 3);
  drawRivets(0, 3, W, 3);

  // SCORE
  ctx.font = 'bold ' + Math.round(clamp(L.rowScoreH*0.62, 16, 50)) + 'px "Courier New", monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
  ctx.fillText(String(score).padStart(6,'0'), W/2, L.rowScoreY + L.rowScoreH*0.72);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W/2-L.contentW*0.32, L.rowScoreY+L.rowScoreH*0.92);
  ctx.lineTo(W/2+L.contentW*0.32, L.rowScoreY+L.rowScoreH*0.92);
  ctx.stroke();

  // LIVES icon row, above HEADING
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.font = Math.max(9, L.livesRowH*0.32) + 'px "Courier New", monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.fillText('LIVES', L.col1X, L.livesLabelY);
  const livesLabelW = ctx.measureText('LIVES').width + L.livesIconR*1.2;
  for(let i=0;i<lives;i++){
    drawShipIcon(L.col1X+livesLabelW+i*(L.livesIconR*2.1), L.livesIconY, L.livesIconR);
  }

  // HEADING + ATTITUDE, stacked, as large as the column allows (no text
  // labels -- the gauges are self-explanatory at this size, and dropping
  // them frees up more room for the gauges themselves)
  drawCompassWheel(L.headingCX, L.headingCY, L.headingR, headingIndX, headingIndY);
  drawAttitudeGlobe(L.attitudeCX, L.attitudeCY, L.attitudeR, roll, headingIndY);

  // SPEED vertical slider
  drawSpeedSlider(L);

  // Cursor wheel -- the only aim/flight input
  drawWheel(L.wheel.cx, L.wheel.cy, L.wheel.r, wheelDir);

  // FIRE
  drawButton(L.btnFire, mouseHeld);

  ctx.restore();
}

function drawHitFlash(){
  if(hitFlash <= 0) return;
  ctx.save();
  ctx.globalAlpha = clamp(hitFlash,0,1)*0.35;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,W,VIEW_H);
  ctx.restore();
}

// rev12: white overlay + jagged crack lines shown for the whole life-lost
// interstitial -- back to this game's monochrome palette now that red is
// no longer reserved for the (removed) stargates. The "HULL BREACH" text
// itself is plain white again in showLifeLostScreen().
function drawLifeLostOverlay(){
  if(lifeLostTimer <= 0) return;
  ctx.save();
  ctx.globalAlpha = 0.16;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,W,VIEW_H);
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
  ctx.lineWidth = 1.8;
  for(const pts of crackLines){
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function render(t){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake > 0){
    ctx.translate(rand(-4,4)*shake, rand(-4,4)*shake);
  }

  drawStars(t);
  if(state==='playing' || state==='gameover'){
    drawGuideLines();
    const sorted = asteroids.slice().sort((a,b)=> b.z - a.z);
    for(const a of sorted) drawAsteroid(a);
    drawTracers();
    drawParticles();
    drawCrosshair(t);
    drawHitFlash();
    drawLifeLostOverlay();
  } else {
    drawGuideLines();
  }
  drawFraming();
  drawConsole();
  ctx.restore();
}

renderTitleScreen();

// ---------- MAIN LOOP ----------
function loop(now){
  if(!lastTime) lastTime = now;
  let dt = (now-lastTime)/1000;
  if(dt > 0.05) dt = 0.05;
  lastTime = now;
  try{
    update(dt);
    render(now);
  }catch(err){
    console.error('Game loop error:', err);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
